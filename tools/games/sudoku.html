<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku Elite | Multi-Platform</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --primary: #58a6ff;
            --secondary: #1f6feb;
            --accent: #238636;
            --error: #f85149;
            --text: #c9d1d9;
            --cell-fixed: #8b949e;
            --border: #30363d;
            --grid-line: #f0f6fc;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', -apple-system, sans-serif;
            touch-action: manipulation; /* Prevents double-tap zoom on mobile */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px; /* Limits width on Desktop/Tabs */
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 15px;
        }

        /* Screen Management */
        .screen { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.4s ease; }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Initial Screen */
        .menu-screen { text-align: center; justify-content: center; }
        .menu-screen h1 { 
            font-size: clamp(2.5rem, 8vw, 3.5rem); 
            margin-bottom: 1.5rem; 
            background: linear-gradient(var(--primary), var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 900; 
        }
        
        .level-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            max-height: 60vh;
            overflow-y: auto;
            padding: 5px;
        }

        .btn-lvl { 
            padding: clamp(12px, 4vw, 20px); 
            background: var(--card); 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 600; 
            transition: 0.2s; 
        }

        /* HUD */
        .hud { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; margin-bottom: 10px; }
        .strike-zone { color: var(--error); font-weight: 800; letter-spacing: 2px; font-size: 1.1rem; }
        .timer { font-family: monospace; font-size: 1.2rem; color: var(--primary); }

        /* Responsive Grid System */
        .board-wrap { position: relative; width: 100%; aspect-ratio: 1; margin: 0 auto 15px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            border: 2px solid var(--grid-line); 
            background: var(--grid-line); 
            gap: 1px; 
            width: 100%; 
            height: 100%; 
        }

        .cell { 
            background: var(--card); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            user-select: none; 
            font-size: clamp(1.2rem, 5vw, 1.8rem); 
            position: relative; 
        }

        .cell.selected { background: #1f6feb33; box-shadow: inset 0 0 0 3px var(--primary); z-index: 5; }
        .cell.fixed { color: var(--cell-fixed); font-weight: 800; background: #0d1117; }
        .cell.wrong { color: var(--error); background: rgba(248, 81, 73, 0.1); }
        .cell.user { color: var(--primary); }

        /* Thick Borders for 3x3 visibility */
        .cell:nth-child(3n) { border-right: 2px solid var(--grid-line); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--grid-line); }

        /* Pencil Notes */
        .notes { display: grid; grid-template-columns: repeat(3, 1fr); width: 100%; height: 100%; padding: 2px; pointer-events: none; }
        .note { font-size: clamp(0.5rem, 2vw, 0.65rem); color: var(--secondary); text-align: center; font-weight: bold; }

        /* Keypad Optimized for Mobile Thumbs */
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: auto; }
        .key { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            padding: clamp(10px, 3vh, 18px) 0; 
            color: white; 
            font-weight: 800; 
            cursor: pointer; 
            position: relative; 
            font-size: 1.2rem; 
        }
        .key .badge { position: absolute; top: 2px; right: 4px; font-size: 0.65rem; color: var(--cell-fixed); }
        .key.completed { opacity: 0.2; pointer-events: none; }

        /* Action Bar */
        .actions { display: flex; gap: 8px; margin: 15px 0; }
        .btn-act { flex: 1; padding: 12px 5px; border-radius: 10px; border: none; background: #21262d; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-act.active { background: var(--accent); }

        /* Overlays */
        .overlay { position: absolute; top:0; left:0; width: 100%; height:100%; background: rgba(13,17,23,0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
        .overlay.active { display: flex; }
        .blur-grid { filter: blur(15px); }

        .btn-main { padding: 15px 40px; background: var(--primary); border: none; color: white; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }

        /* Tablet/Desktop tweaks */
        @media (min-width: 768px) {
            .container { max-width: 480px; height: auto; padding: 30px; border: 1px solid var(--border); border-radius: 20px; margin: 20px; }
            .keypad { gap: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="scr-menu" class="screen active menu-screen">
        <h1>SUDOKU</h1>
        <p style="margin-bottom: 25px; color: var(--cell-fixed);">Select a Level to Start</p>
        <div class="level-grid" id="lvl-container"></div>
    </div>

    <div id="scr-game" class="screen">
        <div class="hud">
            <div style="font-weight: bold;">LEVEL <span id="cur-lvl">1</span></div>
            <div class="strike-zone" id="strike-ui">◦ ◦ ◦</div>
            <div class="timer" id="game-clock">00:00</div>
        </div>

        <div class="board-wrap">
            <div class="grid" id="sudoku-grid"></div>
            <div class="overlay" id="pause-ui">
                <h2 style="font-size: 2rem;">PAUSED</h2>
                <button class="btn-main" onclick="togglePause()">RESUME</button>
            </div>
        </div>

        <div class="keypad" id="num-pad">
             <script>
                for(let i=1; i<=9; i++) 
                    document.write(`<button class="key" onclick="pressKey(${i})">${i}<span class="badge" id="b-${i}">9</span></button>`);
             </script>
             <button class="key" style="background: #30363d;" onclick="pressKey(0)">⌫</button>
        </div>

        <div class="actions">
            <button class="btn-act" id="pencil-toggle" onclick="togglePencil()">PENCIL OFF</button>
            <button class="btn-act" onclick="togglePause()">PAUSE</button>
            <button class="btn-act" onclick="useHint()">HINT</button>
        </div>
    </div>

    <div class="overlay" id="win-ui">
        <h1 style="color: var(--accent); font-size: 2.5rem; margin-bottom: 10px;">WINNER!</h1>
        <p id="win-msg" style="font-size: 1.2rem;"></p>
        <button class="btn-main" onclick="initGame(currentLvl)">PLAY AGAIN</button>
        <button class="btn-act" style="margin-top: 15px; width: 180px;" onclick="exitToMenu()">MAIN MENU</button>
    </div>

    <div class="overlay" id="lose-ui">
        <h1 style="color: var(--error); font-size: 2.5rem; margin-bottom: 10px;">FAILED</h1>
        <p>3 Mistakes made. Level Reset.</p>
        <button class="btn-main" onclick="exitToMenu()">TRY AGAIN</button>
    </div>

</div>

<script>
    let board = [], solution = [], fixedIdx = [], notes = Array.from({length: 81}, () => []);
    let selected = null, pencilMode = false, paused = false;
    let strikes = 0, seconds = 0, timerId, currentLvl = 1;

    // Load Levels
    const menu = document.getElementById('lvl-container');
    for(let i=1; i<=10; i++) {
        const b = document.createElement('button');
        b.className = 'btn-lvl';
        b.innerText = `LEVEL ${i}`;
        b.onclick = () => { currentLvl = i; startMatch(); };
        menu.appendChild(b);
    }

    function startMatch() {
        document.getElementById('scr-menu').classList.remove('active');
        document.getElementById('scr-game').classList.add('active');
        initGame(currentLvl);
    }

    function exitToMenu() {
        clearInterval(timerId);
        document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
        document.getElementById('scr-game').classList.remove('active');
        document.getElementById('scr-menu').classList.add('active');
    }

    function initGame(lvl) {
        strikes = 0; seconds = 0; selected = null;
        document.getElementById('cur-lvl').innerText = lvl;
        document.getElementById('win-ui').classList.remove('active');
        document.getElementById('lose-ui').classList.remove('active');
        updateStrikes();
        
        solution = genBoard();
        // Difficulty formula: Level 1 has ~48 numbers, Level 10 has ~18
        const fillCount = 50 - (lvl * 3.2); 
        board = Array(81).fill(0);
        fixedIdx = [];
        
        let indices = Array.from({length: 81}, (_, i) => i).sort(() => Math.random() - 0.5);
        for(let i=0; i<Math.floor(fillCount); i++) {
            let idx = indices[i];
            board[idx] = solution[idx];
            fixedIdx.push(idx);
        }

        notes = Array.from({length: 81}, () => []);
        renderGrid();
        startTimer();
    }

    function renderGrid() {
        const grid = document.getElementById('sudoku-grid');
        grid.innerHTML = '';
        for(let i=0; i<81; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (fixedIdx.includes(i)) {
                cell.classList.add('fixed');
                cell.innerText = board[i];
            } else if (board[i] !== 0) {
                cell.classList.add('user');
                if (board[i] !== solution[i]) cell.classList.add('wrong');
                cell.innerText = board[i];
            } else if (notes[i].length > 0) {
                const nGrid = document.createElement('div');
                nGrid.className = 'notes';
                for(let n=1; n<=9; n++) {
                    const nd = document.createElement('div');
                    nd.className = 'note';
                    nd.innerText = notes[i].includes(n) ? n : '';
                    nGrid.appendChild(nd);
                }
                cell.appendChild(nGrid);
            }
            if (selected === i) cell.classList.add('selected');
            cell.onclick = () => { if(!paused) { selected = i; renderGrid(); } };
            grid.appendChild(cell);
        }
        updateBadges();
    }

    function pressKey(n) {
        if (selected === null || paused || fixedIdx.includes(selected)) return;

        if (n === 0) { // Erase
            board[selected] = 0;
            notes[selected] = [];
        } else if (pencilMode) {
            let nts = notes[selected];
            notes[selected] = nts.includes(n) ? nts.filter(x => x !== n) : [...nts, n];
            board[selected] = 0;
        } else {
            if (n !== solution[selected]) {
                strikes++;
                updateStrikes();
                if (strikes >= 3) return showLose();
            }
            board[selected] = n;
            notes[selected] = [];
        }
        renderGrid();
        checkVictory();
    }

    function updateBadges() {
        for(let i=1; i<=9; i++) {
            let left = 9 - board.filter(x => x === i).length;
            document.getElementById(`b-${i}`).innerText = left > 0 ? left : '✓';
            document.querySelectorAll('.key')[i-1].classList.toggle('completed', left <= 0);
        }
    }

    function updateStrikes() {
        let s = "";
        for(let i=0; i<3; i++) s += (i < strikes) ? "✘ " : "◦ ";
        document.getElementById('strike-ui').innerText = s;
    }

    function togglePencil() {
        pencilMode = !pencilMode;
        document.getElementById('pencil-toggle').innerText = pencilMode ? "PENCIL ON" : "PENCIL OFF";
        document.getElementById('pencil-toggle').classList.toggle('active', pencilMode);
    }

    function togglePause() {
        paused = !paused;
        document.getElementById('pause-ui').classList.toggle('active');
        document.getElementById('sudoku-grid').classList.toggle('blur-grid');
        if(paused) clearInterval(timerId); else startTimer();
    }

    function useHint() {
        if (selected === null || fixedIdx.includes(selected)) return;
        board[selected] = solution[selected];
        notes[selected] = [];
        renderGrid();
        checkVictory();
    }

    function genBoard() {
        let b = Array(81).fill(0);
        function solve(arr) {
            for(let i=0; i<81; i++) {
                if (arr[i] === 0) {
                    let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                    for(let n of nums) {
                        if (isValid(arr, i, n)) {
                            arr[i] = n;
                            if (solve(arr)) return true;
                            arr[i] = 0;
                        }
                    }
                    return false;
                }
            }
            return true;
        }
        solve(b);
        return b;
    }

    function isValid(b, idx, n) {
        let r = Math.floor(idx/9), c = idx%9;
        for(let i=0; i<9; i++) {
            if (b[r*9+i] === n || b[i*9+c] === n) return false;
            let boxR = 3 * Math.floor(r/3);
            let boxC = 3 * Math.floor(c/3);
            for(let br=0; br<3; br++) {
                for(let bc=0; bc<3; bc++) {
                    if (b[(boxR+br)*9 + (boxC+bc)] === n) return false;
                }
            }
        }
        return true;
    }

    function startTimer() {
        timerId = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds/60).toString().padStart(2, '0');
            let s = (seconds%60).toString().padStart(2, '0');
            document.getElementById('game-clock').innerText = `${m}:${s}`;
        }, 1000);
    }

    function checkVictory() {
        if (!board.includes(0) && board.every((v, i) => v === solution[i])) {
            clearInterval(timerId);
            document.getElementById('win-ui').classList.add('active');
            document.getElementById('win-msg').innerText = `Time: ${document.getElementById('game-clock').innerText}`;
        }
    }

    function showLose() {
        clearInterval(timerId);
        document.getElementById('lose-ui').classList.add('active');
    }
</script>
</body>
</html>
