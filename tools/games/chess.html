<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Chess Suite</title>
    
    <link rel="stylesheet"
      href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
      integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2hBLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU"
      crossorigin="anonymous">

    <style>
        :root {
            --bg-color: #212121;
            --box-color: #333;
            --accent-color: #00cec9;
            --text-color: #dfe6e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 { margin: 0 0 10px 0; font-weight: 300; letter-spacing: 1px; }

        /* --- MENUS --- */
        .menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .hidden { display: none !important; }

        .menu-box {
            background: var(--box-color);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .btn {
            background: var(--accent-color);
            color: #2d3436;
            border: none;
            padding: 12px 20px;
            width: 100%;
            margin: 8px 0;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-secondary { background: #636e72; color: white; }
        .btn-red { background: #ff7675; color: white; }

        input[type="range"] { width: 100%; margin: 15px 0; }
        input[type="text"] {
            width: 90%; padding: 10px; margin: 10px 0;
            background: #222; border: 1px solid #555; color: white;
            text-align: center; font-family: monospace; letter-spacing: 2px;
        }

        /* --- GAME UI --- */
        #board { width: 400px; margin: 10px auto; }

        .game-ui { display: none; width: 400px; }
        .active-game .game-ui { display: block; }
        
        .status-bar {
            display: flex; justify-content: space-between;
            background: #444; padding: 10px; border-radius: 5px;
            margin-bottom: 10px; font-size: 0.9em;
        }

        /* --- REVIEW MODAL --- */
        #reviewModal {
            display: none; position: fixed; z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); overflow-y: auto;
        }
        .modal-content {
            background-color: #333; margin: 5% auto; padding: 20px;
            width: 90%; max-width: 500px; border-radius: 10px;
        }
        .review-item {
            padding: 10px; margin: 5px 0; border-left: 4px solid #888;
            background: #2a2a2a; border-radius: 3px;
        }
        .blunder { border-left-color: #ff4757; }
        .inaccuracy { border-left-color: #ffa502; }
    </style>
</head>
<body>

    <div id="mainMenu" class="menu-overlay">
        <div class="menu-box">
            <h2>Chess Master</h2>
            <button class="btn" onclick="showMenu('computerMenu')">👤 vs Computer 🤖</button>
            <button class="btn" onclick="showMenu('friendMenu')">👥 vs Friend</button>
        </div>
    </div>

    <div id="computerMenu" class="menu-overlay hidden">
        <div class="menu-box">
            <h3>AI Difficulty</h3>
            <label>Level: <span id="levelVal">5</span></label>
            <input type="range" id="diffRange" min="1" max="10" value="5" oninput="document.getElementById('levelVal').innerText = this.value">
            <button class="btn" onclick="startGame('computer')">Start Game</button>
            <button class="btn btn-secondary" onclick="showMenu('mainMenu')">Back</button>
        </div>
    </div>

    <div id="friendMenu" class="menu-overlay hidden">
        <div class="menu-box">
            <h3>Choose Mode</h3>
            <button class="btn" onclick="startGame('local')">🏠 Offline (Same Device)</button>
            <button class="btn" onclick="showMenu('onlineMenu')">🌐 Online (Share Code)</button>
            <button class="btn btn-secondary" onclick="showMenu('mainMenu')">Back</button>
        </div>
    </div>

    <div id="onlineMenu" class="menu-overlay hidden">
        <div class="menu-box">
            <h3>Online Multiplayer</h3>
            <div id="online-start">
                <button class="btn" onclick="initOnlineHost()">Generate Code (Host)</button>
                <p>- OR -</p>
                <input type="text" id="joinCodeInput" placeholder="Enter Friend's Code">
                <button class="btn btn-secondary" onclick="initOnlineJoin()">Join Game</button>
            </div>
            <div id="online-waiting" class="hidden">
                <p>Share this code:</p>
                <input type="text" id="myPeerId" readonly value="Generating...">
                <p>Waiting for opponent...</p>
            </div>
            <button class="btn btn-red" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <div id="gameArea" class="active-game hidden">
        <div class="status-bar">
            <span id="status">White to move</span>
            <span id="gameModeDisplay">Mode: Local</span>
        </div>
        <div id="board"></div>
        <div style="text-align: center; margin-top: 10px;">
            <button class="btn btn-red" style="width: auto;" onclick="location.reload()">Exit / Menu</button>
            <button id="analyzeBtn" class="btn" style="width: auto; background-color: #ffa502; color: #000; display:none;" onclick="runAnalysis()">🔎 Review Game</button>
        </div>
    </div>

    <div id="reviewModal">
        <div class="modal-content">
            <h2 style="margin-top:0">Game Analysis</h2>
            <div id="reviewList"></div>
            <button class="btn" onclick="document.getElementById('reviewModal').style.display='none'">Close</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        // --- GLOBAL STATE ---
        var board = null;
        var game = new Chess();
        var currentMode = 'local'; // local, computer, online
        var aiLevel = 5;
        var playerColor = 'w'; // For online/computer (player is white by default)
        var peer = null;
        var conn = null;

        // --- UI NAVIGATION ---
        function showMenu(menuId) {
            $('.menu-overlay').addClass('hidden');
            $('#' + menuId).removeClass('hidden');
        }

        function startGame(mode) {
            currentMode = mode;
            if (mode === 'computer') {
                aiLevel = parseInt(document.getElementById('diffRange').value);
                document.getElementById('gameModeDisplay').innerText = `Vs Computer (Lvl ${aiLevel})`;
            } else if (mode === 'local') {
                document.getElementById('gameModeDisplay').innerText = `Vs Friend (Offline)`;
            }

            $('.menu-overlay').addClass('hidden');
            $('#gameArea').removeClass('hidden');
            
            initBoard();
        }

        // --- BOARD LOGIC ---
        function initBoard() {
            var config = {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            };
            board = Chessboard('board', config);
            updateStatus();
        }

        function onDragStart(source, piece) {
            if (game.game_over()) return false;

            // 1. Computer Mode: Only allow moving White
            if (currentMode === 'computer' && game.turn() === 'b') return false;

            // 2. Online Mode: Only allow moving your own color
            if (currentMode === 'online') {
                if (game.turn() !== playerColor) return false;
            }

            // Standard check: only pick up own pieces
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateStatus();

            // Handle Modes
            if (currentMode === 'computer' && !game.game_over()) {
                window.setTimeout(makeComputerMove, 250);
            }
            
            if (currentMode === 'online') {
                // Send move to friend
                if (conn && conn.open) {
                    conn.send({ type: 'move', from: source, to: target });
                }
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function updateStatus() {
            var status = '';
            var moveColor = (game.turn() === 'b') ? 'Black' : 'White';

            if (game.in_checkmate()) status = 'Game over, ' + moveColor + ' is in checkmate.';
            else if (game.in_draw()) status = 'Game over, drawn position';
            else {
                status = moveColor + ' to move';
                if (game.in_check()) status += ', ' + moveColor + ' is in check';
            }

            $('#status').html(status);

            if (game.game_over()) {
                $('#analyzeBtn').show();
            }
        }

        // --- COMPUTER AI (Scaled Difficulty) ---
        function makeComputerMove() {
            var possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;

            var bestMove = null;
            
            // Level 1-2: Pure Random
            if (aiLevel <= 2) {
                var randomIdx = Math.floor(Math.random() * possibleMoves.length);
                game.move(possibleMoves[randomIdx]);
            } 
            // Level 3-10: Minimax Search
            else {
                // Depth logic: Lvl 3-5 = Depth 1; Lvl 6-8 = Depth 2; Lvl 9-10 = Depth 3
                var depth = 1;
                if (aiLevel >= 6) depth = 2;
                if (aiLevel >= 9) depth = 3;

                // For lower levels, occasionally pick a random move to simulate "mistakes"
                var mistakeChance = (10 - aiLevel) * 0.1; // Lvl 5 = 50% chance to just play greedy, 50% chance to think deeper
                
                // Simplified Minimax for Single File
                bestMove = getBestMove(game, depth, true);
                game.move(bestMove);
            }
            
            board.position(game.fen());
            updateStatus();
        }

        // Simplified Minimax Engine
        var pieceValues = { 'p': 10, 'n': 30, 'b': 30, 'r': 50, 'q': 90, 'k': 900 };
        
        function evaluateBoard(gameObj) {
            let total = 0;
            gameObj.board().forEach(row => {
                row.forEach(p => {
                    if(p) {
                        let val = pieceValues[p.type];
                        // Bonus for center control (simple heuristic)
                        if (p.color === 'w') total += val;
                        else total -= val;
                    }
                });
            });
            return total;
        }

        function getBestMove(gameObj, depth, isMaximizing) {
            var moves = gameObj.moves({ verbose: true });
            var bestMoveVal = isMaximizing ? -9999 : 9999;
            var bestMove = moves[0];

            // Shuffle moves for variety
            moves.sort(() => Math.random() - 0.5);

            for(var i = 0; i < moves.length; i++) {
                gameObj.move(moves[i]);
                var value = minimax(gameObj, depth - 1, -10000, 10000, !isMaximizing);
                gameObj.undo();

                if(isMaximizing) {
                    if(value > bestMoveVal) { bestMoveVal = value; bestMove = moves[i]; }
                } else {
                    if(value < bestMoveVal) { bestMoveVal = value; bestMove = moves[i]; }
                }
            }
            return bestMove;
        }

        function minimax(gameObj, depth, alpha, beta, isMaximizing) {
            if (depth === 0) return -evaluateBoard(gameObj); // AI plays Black, so it wants Negative score (if Black is negative)
            
            var moves = gameObj.moves();
            if (moves.length === 0) return -evaluateBoard(gameObj);

            if (isMaximizing) {
                var best = -9999;
                for (var i = 0; i < moves.length; i++) {
                    gameObj.move(moves[i]);
                    best = Math.max(best, minimax(gameObj, depth - 1, alpha, beta, !isMaximizing));
                    gameObj.undo();
                    alpha = Math.max(alpha, best);
                    if (beta <= alpha) return best;
                }
                return best;
            } else {
                var best = 9999;
                for (var i = 0; i < moves.length; i++) {
                    gameObj.move(moves[i]);
                    best = Math.min(best, minimax(gameObj, depth - 1, alpha, beta, !isMaximizing));
                    gameObj.undo();
                    beta = Math.min(beta, best);
                    if (beta <= alpha) return best;
                }
                return best;
            }
        }

        // --- ONLINE MULTIPLAYER (PEERJS) ---
        
        function initOnlineHost() {
            // Generate a short ID
            var shortId = Math.random().toString(36).substr(2, 5).toUpperCase();
            
            $('#online-start').addClass('hidden');
            $('#online-waiting').removeClass('hidden');
            $('#myPeerId').val("Creating...");

            peer = new Peer(shortId); 

            peer.on('open', function(id) {
                $('#myPeerId').val(id);
            });

            peer.on('connection', function(c) {
                conn = c;
                setupConnection('w'); // Host is White
                $('#onlineMenu').addClass('hidden'); // Close menu
                startGame('online');
                playerColor = 'w';
                document.getElementById('gameModeDisplay').innerText = `Online: vs Opponent`;
                alert("Opponent Connected! You are White.");
            });
            
            peer.on('error', function(err) {
               alert("ID Taken or Connection Error. Try again.");
               location.reload();
            });
        }

        function initOnlineJoin() {
            var friendId = $('#joinCodeInput').val().trim().toUpperCase();
            if(!friendId) return alert("Enter a code!");

            peer = new Peer(); // Get random ID for joiner

            peer.on('open', function(id) {
                conn = peer.connect(friendId);
                
                conn.on('open', function() {
                    setupConnection('b'); // Joiner is Black
                    $('#onlineMenu').addClass('hidden');
                    startGame('online');
                    playerColor = 'b';
                    board.orientation('black');
                    document.getElementById('gameModeDisplay').innerText = `Online: vs Host`;
                    alert("Connected! You are Black.");
                });
            });
        }

        function setupConnection(myColor) {
            conn.on('data', function(data) {
                if(data.type === 'move') {
                    game.move({ from: data.from, to: data.to, promotion: 'q' });
                    board.position(game.fen());
                    updateStatus();
                }
            });
        }

        // --- REVIEW SYSTEM (Same as before) ---
        function runAnalysis() {
            let history = game.history({ verbose: true });
            let tempGame = new Chess();
            let reviewHTML = "";
            let prevEval = 0;

            history.forEach((move, i) => {
                let moveNum = Math.floor(i / 2) + 1;
                let player = (i % 2 === 0) ? "White" : "Black";
                
                // Simple Eval Logic for Review
                let bestMove = getBestMove(tempGame, 1, tempGame.turn() === 'w'); // Fast check
                
                tempGame.move(move);
                let currentEval = evaluateBoard(tempGame);
                
                let diff = currentEval - prevEval;
                let msg = "";
                let cssClass = "";

                // Detection Logic
                if (player === "White") {
                    if (diff < -5) { msg = "Blunder! Major material loss."; cssClass = "blunder"; }
                    else if (diff < -1 && bestMove && bestMove.san !== move.san) { msg = "Inaccuracy."; cssClass = "inaccuracy"; }
                } else {
                    if (diff > 5) { msg = "Blunder! Major material loss."; cssClass = "blunder"; }
                    else if (diff > 1 && bestMove && bestMove.san !== move.san) { msg = "Inaccuracy."; cssClass = "inaccuracy"; }
                }

                if (msg) {
                    reviewHTML += `<div class="review-item ${cssClass}">
                        <b>${moveNum}. ${player} (${move.san})</b>: ${msg}<br>
                        <small style="color:#aaa">Better: ${bestMove ? bestMove.san : '?'}</small>
                    </div>`;
                }
                prevEval = currentEval;
            });

            if(!reviewHTML) reviewHTML = "<p>Great game! No major mistakes detected.</p>";
            document.getElementById('reviewList').innerHTML = reviewHTML;
            document.getElementById('reviewModal').style.display = 'block';
        }

    </script>
</body>
</html>
