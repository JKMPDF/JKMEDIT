<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LedgerPro | Advanced Cloud Sync</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF; --success: #34C759; --danger: #FF3B30;
            --bg: #F8F9FB; --surface: #FFFFFF; --text: #111827; --border: #E5E7EB;
        }

        [data-theme="dark"] {
            --bg: #121212; --surface: #1E1E1E; --text: #F3F4F6; --border: #333333;
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); }
        
        header { 
            background: var(--surface); padding: 15px 24px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .glass-card { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .user-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .transaction-list { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; font-size: 14px; }
        .trx-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--border); }

        .btn { padding: 10px 16px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        
        .hidden { display: none !important; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--surface); width: 90%; max-width: 500px; border-radius: 20px; padding: 25px; }

        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); margin: 10px 0; }
        
        .sync-badge { font-size: 12px; color: var(--primary); font-weight: bold; }
        .delete-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 20px;">LedgerPro</div>
    <div id="header-tools" class="hidden" style="display: flex; gap: 15px; align-items: center;">
        <span id="sync-status" class="sync-badge">Cloud Synced</span>
        <button class="btn btn-outline" onclick="toggleModal('settings-modal')">⚙️</button>
    </div>
</header>

<div class="container">
    <div id="login-view" class="glass-card" style="text-align: center; margin-top: 50px;">
        <h2>Welcome Back</h2>
        <p>Syncing your ledger across all devices.</p>
        <button class="btn btn-primary" id="login-btn" style="margin: 20px auto;">Login with Google</button>
    </div>

    <div id="dashboard-view" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="greeting">Hello!</h2>
            <button class="btn btn-primary" onclick="addUser()">+ New User</button>
        </div>
        <div id="user-container"></div>
    </div>
</div>

<div id="settings-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Settings</h3>
        <label>Your Name</label>
        <input type="text" id="set-handler-name">
        <div style="display:flex; justify-content: space-between; align-items: center; margin: 20px 0;">
            <span>Dark Mode</span>
            <input type="checkbox" id="theme-toggle" style="width: auto;" onchange="toggleTheme()">
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="saveSettings()">Save & Sync</button>
        <button class="btn btn-outline" style="width: 100%; margin-top: 10px;" onclick="toggleModal('settings-modal')">Close</button>
    </div>
</div>

<script>
    const CLIENT_ID = '690707353467-92ktj6ah0mn7f7gq0e8812o1a73gujlh.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';

    let tokenClient;
    let accessToken = localStorage.getItem('access_token');
    let driveFileId = localStorage.getItem('drive_file_id');
    let state = {
        handler: 'User',
        theme: 'light',
        users: []
    };

    window.onload = function() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (resp) => {
                accessToken = resp.access_token;
                localStorage.setItem('access_token', accessToken);
                startApp();
            }
        });

        document.getElementById('login-btn').onclick = () => tokenClient.requestAccessToken();
        if (accessToken) startApp();
    };

    async function startApp() {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('dashboard-view').classList.remove('hidden');
        document.getElementById('header-tools').classList.remove('hidden');

        // Initial render from local
        const local = localStorage.getItem('ledger_data_v3');
        if (local) {
            state = JSON.parse(local);
            applyTheme(state.theme);
        }
        
        render();
        await syncFromDrive();
    }

    function addUser() {
        const name = prompt("User Name:");
        if (name) {
            state.users.push({ id: Date.now(), name, balance: 0, history: [] });
            saveAndSync();
        }
    }

    function recordEntry(userId, type) {
        const amount = parseFloat(prompt("Enter Amount:"));
        const note = prompt("Narration:");
        if (isNaN(amount)) return;

        const user = state.users.find(u => u.id === userId);
        const change = type === 'receive' ? amount : -amount;
        
        user.balance += change;
        user.history.push({
            date: new Date().toLocaleDateString(),
            amount,
            note: note || 'General',
            type
        });
        saveAndSync();
    }

    function toggleDetails(userId) {
        const el = document.getElementById(`details-${userId}`);
        el.classList.toggle('hidden');
    }

    function deleteUser(userId) {
        const user = state.users.find(u => u.id === userId);
        if (user.balance !== 0) {
            alert("Cannot delete user with non-zero balance!");
            return;
        }
        if (confirm("Delete this ledger?")) {
            state.users = state.users.filter(u => u.id !== userId);
            saveAndSync();
        }
    }

    function render() {
        document.getElementById('greeting').innerText = `Hello, ${state.handler}`;
        document.getElementById('set-handler-name').value = state.handler;
        const container = document.getElementById('user-container');
        container.innerHTML = '';

        state.users.forEach(u => {
            const isRed = u.balance < 0;
            container.innerHTML += `
                <div class="glass-card">
                    <div class="user-header" onclick="toggleDetails(${u.id})">
                        <div>
                            <strong>${u.name}</strong>
                            <div style="font-size: 12px; color: ${isRed ? 'var(--danger)' : 'var(--success)'}">
                                ${isRed ? 'Payable' : 'Receivable'}: ₹${Math.abs(u.balance)}
                            </div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-outline" style="color:var(--danger)" onclick="event.stopPropagation(); recordEntry(${u.id}, 'give')">Give</button>
                            <button class="btn btn-outline" style="color:var(--success)" onclick="event.stopPropagation(); recordEntry(${u.id}, 'receive')">Recv</button>
                            <button class="delete-btn" style="border:none; background:none; font-size:18px;" 
                                ${u.balance !== 0 ? 'disabled' : ''} 
                                onclick="event.stopPropagation(); deleteUser(${u.id})">🗑️</button>
                        </div>
                    </div>
                    <div id="details-${u.id}" class="transaction-list hidden">
                        ${u.history.length === 0 ? '<p>No history yet</p>' : u.history.map(h => `
                            <div class="trx-item">
                                <span>${h.date} - ${h.note}</span>
                                <span style="color:${h.type === 'receive' ? 'var(--success)' : 'var(--danger)'}">
                                    ${h.type === 'receive' ? '+' : '-'}₹${h.amount}
                                </span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
    }

    // Settings Functions
    function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
    
    function toggleTheme() {
        state.theme = document.getElementById('theme-toggle').checked ? 'dark' : 'light';
        applyTheme(state.theme);
    }

    function applyTheme(t) {
        document.body.setAttribute('data-theme', t);
        document.getElementById('theme-toggle').checked = (t === 'dark');
    }

    function saveSettings() {
        state.handler = document.getElementById('set-handler-name').value;
        toggleModal('settings-modal');
        saveAndSync();
    }

    // Drive Sync Logic
    function saveAndSync() {
        localStorage.setItem('ledger_data_v3', JSON.stringify(state));
        render();
        uploadToDrive();
    }

    async function uploadToDrive() {
        if (!accessToken) return;
        document.getElementById('sync-status').innerText = "Syncing...";
        const blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
        const metadata = { name: 'ledger_v3.json', mimeType: 'application/json' };
        
        let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
        let method = 'POST';

        if (driveFileId) {
            url = `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`;
            method = 'PATCH';
        }

        const resp = await fetch(url, {
            method, headers: { Authorization: `Bearer ${accessToken}` },
            body: method === 'PATCH' ? blob : createMultipart(metadata, blob)
        });

        if (resp.ok) {
            const data = await resp.json();
            if (data.id) { driveFileId = data.id; localStorage.setItem('drive_file_id', driveFileId); }
            document.getElementById('sync-status').innerText = "Cloud Synced";
        }
    }

    async function syncFromDrive() {
        if (!accessToken) return;
        const listResp = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='ledger_v3.json' and trashed=false`, {
            headers: { Authorization: `Bearer ${accessToken}` }
        });
        const listData = await listResp.json();
        
        if (listData.files?.length > 0) {
            driveFileId = listData.files[0].id;
            localStorage.setItem('drive_file_id', driveFileId);
            const fileResp = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            state = await fileResp.json();
            applyTheme(state.theme);
            render();
        }
    }

    function createMultipart(m, b) {
        const bound = 'foo_bar';
        return new Blob([`\r\n--${bound}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(m)}\r\n--${bound}\r\nContent-Type: application/json\r\n\r\n`, b, `\r\n--${bound}--`]);
    }
</script>
</body>
</html>
