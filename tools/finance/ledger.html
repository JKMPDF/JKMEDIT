<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LedgerPro | Professional Sync</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0056D2; --success: #198754; --danger: #DC3545;
            --bg: #F0F2F5; --surface: #FFFFFF; --text: #1C1E21; --border: #E4E6EB;
        }
        [data-theme="dark"] {
            --bg: #18191A; --surface: #242526; --text: #E4E6EB; --border: #3A3B3C;
        }
        * { box-sizing: border-box; transition: background 0.2s, color 0.2s, border-color 0.2s; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* Loading Overlay */
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text);
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Header */
        header { 
            background: var(--surface); padding: 15px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: var(--text);
        }
        
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .card { background: var(--surface); color: var(--text); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        /* Buttons & Inputs */
        .btn { padding: 10px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; color: var(--text); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #FFEBEB; color: var(--danger); }
        .btn-success { background: #E7F9ED; color: var(--success); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        
        input, textarea { 
            width: 100%; padding: 12px; border: 1px solid var(--border); 
            border-radius: 8px; background: var(--bg); color: var(--text); margin-bottom: 10px; 
            font-family: inherit;
        }
        
        /* Profiles */
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--border); }
        .avatar-lg { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; display: block; object-fit: cover; }
        .user-row { display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 5px; border-radius: 8px; }
        .user-row:hover { background: var(--bg); }
        
        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--surface); color: var(--text); width: 95%; max-width: 450px; border-radius: 16px; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loader" class="hidden">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 600;" id="loader-text">Loading...</p>
</div>

<header>
    <div style="font-weight: 800; font-size: 20px; display: flex; align-items: center; gap: 10px;">
        <img id="nav-avatar" src="" class="avatar" style="width:35px; height:35px; display:none;">
        LedgerPro
    </div>
    <div id="header-tools" class="hidden">
        <span id="sync-status" style="font-size: 12px; color: var(--success); font-weight: bold; margin-right: 10px;"></span>
        <button class="btn btn-outline" onclick="openSettings()">⚙️ Settings</button>
    </div>
</header>

<div class="container">
    <!-- Login View -->
    <div id="login-view" class="card" style="text-align: center; margin-top: 10vh;">
        <h2>Secure Cloud Ledger</h2>
        <p style="color: #65676B;">Single-device sync architecture.</p>
        <button class="btn btn-primary" id="login-btn" style="padding: 12px 24px; font-size: 16px; margin-top: 20px;">Sign in with Google</button>
    </div>

    <!-- Main Dashboard (List of Users) -->
    <div id="dashboard-view" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="greeting">Accounts</h2>
            <button class="btn btn-primary" onclick="openUserModal()">+ Add Client</button>
        </div>
        <div id="user-container"></div>
    </div>

    <!-- Specific User Dashboard View -->
    <div id="user-dashboard-view" class="hidden">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
            <button class="btn btn-outline" onclick="goBackToDashboard()" style="padding: 8px 12px;">← Back</button>
            <div style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 6px 12px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border);" onclick="openUserModal(currentUserId)">
                <img id="user-dash-pic" class="avatar" src="" style="width: 35px; height: 35px;">
                <h3 id="user-dash-name" style="margin:0; font-size: 16px;">User ✎</h3>
            </div>
        </div>

        <div class="card" style="text-align: center; padding: 30px 20px;">
            <h4 style="margin-top:0; color: #65676B; font-weight: 500;">Net Balance</h4>
            <h1 id="user-dash-balance" style="margin: 10px 0; font-size: 36px;">₹0</h1>
            <span id="user-dash-status" style="font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 4px; background: var(--bg);"></span>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 25px;">
            <button class="btn btn-danger" style="flex: 1; padding: 16px; font-size: 16px;" onclick="addEntry('give')">Give (-)</button>
            <button class="btn btn-success" style="flex: 1; padding: 16px; font-size: 16px;" onclick="addEntry('receive')">Receive (+)</button>
        </div>

        <h3 style="margin-bottom: 15px;">Transaction History</h3>
        <div id="transaction-list"></div>
    </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal hidden">
    <div class="modal-content">
        <h3 style="margin-top:0; border-bottom: 1px solid var(--border); padding-bottom:10px;">Your Profile & Settings</h3>
        <label>Profile Picture</label>
        <input type="file" id="admin-pic-upload" accept="image/*" onchange="processImage(this, 'admin-pic-preview', 'admin')">
        <img id="admin-pic-preview" class="avatar-lg" src="">
        
        <input type="text" id="admin-name" placeholder="Full Name">
        <input type="email" id="admin-email" placeholder="Email Address">
        <input type="text" id="admin-phone" placeholder="Phone Number">
        <textarea id="admin-address" placeholder="Your Address"></textarea>
        
        <div style="display:flex; justify-content: space-between; align-items: center; margin: 15px 0;">
            <strong>Dark Mode</strong>
            <input type="checkbox" id="theme-toggle" style="width: auto; transform: scale(1.2);">
        </div>
        
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;" onclick="saveSettings()">Save Details</button>
        <button class="btn btn-danger" style="width: 100%; margin-bottom: 10px;" onclick="logout()">Log Out</button>
        <button class="btn btn-outline" style="width: 100%;" onclick="closeModal('settings-modal')">Cancel</button>
    </div>
</div>

<!-- Add/Edit Client Modal -->
<div id="user-modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="user-modal-title" style="margin-top:0;">Add / Edit Client</h3>
        <input type="hidden" id="editing-user-id">
        
        <label>Client Picture</label>
        <input type="file" id="user-pic-upload" accept="image/*" onchange="processImage(this, 'user-pic-preview', 'user')">
        <img id="user-pic-preview" class="avatar-lg" src="">
        
        <input type="text" id="user-name" placeholder="Client Name *">
        <input type="email" id="user-email" placeholder="Email">
        <input type="text" id="user-phone" placeholder="Phone Number">
        <textarea id="user-address" placeholder="Address"></textarea>
        
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;" onclick="saveUser()">Save Client</button>
        <button class="btn btn-danger hidden" id="delete-user-btn" style="width: 100%; margin-bottom: 10px;" onclick="deleteCurrentUser()">Delete Client</button>
        <button class="btn btn-outline" style="width: 100%;" onclick="closeModal('user-modal')">Cancel</button>
    </div>
</div>

<script>
    // --- CORE CONFIGURATION ---
    const CLIENT_ID = '690707353467-92ktj6ah0mn7f7gq0e8812o1a73gujlh.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';
    const DEFAULT_PIC = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";

    let tokenClient;
    let accessToken = localStorage.getItem('access_token');
    
    // Single Device Login Token
    let myDeviceToken = localStorage.getItem('my_device_token');
    if (!myDeviceToken) {
        myDeviceToken = 'dev_' + Date.now() + Math.random().toString(36).substr(2, 5);
        localStorage.setItem('my_device_token', myDeviceToken);
    }

    let folderId = localStorage.getItem('jkm_folder_id');
    let fileId = localStorage.getItem('jkm_file_id');
    
    // UI State
    let currentUserId = null;
    let pendingAdminPic = null;
    let pendingUserPic = null;
    let imageCache = {}; // Prevents redownloading images from Drive
    let deviceCheckInterval;

    // Database State
    let state = {
        activeDeviceToken: myDeviceToken,
        theme: 'light',
        admin: { name: '', email: '', phone: '', address: '', pic: '' },
        users:[]
    };

    // --- INITIALIZATION ---
    window.onload = function() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: async (resp) => {
                accessToken = resp.access_token;
                localStorage.setItem('access_token', accessToken);
                // When logging in, we forcefully take over the active session
                state.activeDeviceToken = myDeviceToken; 
                await startApp();
            }
        });

        document.getElementById('login-btn').onclick = () => tokenClient.requestAccessToken({prompt: 'consent'});
        if (accessToken) startApp();
    };

    // --- CLOUD SYNC & FOLDER LOGIC ---
    async function startApp() {
        showLoader("Connecting to Cloud...");
        document.getElementById('login-view').classList.add('hidden');
        
        try {
            await setupFolderAndFile();
            await syncFromDrive();
            
            // Push our device token to cloud to kick out previous logins
            state.activeDeviceToken = myDeviceToken;
            await safeUploadToDrive(true); 

            applyTheme();
            render();
            
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('header-tools').classList.remove('hidden');

            // Continually check if another device has logged in
            deviceCheckInterval = setInterval(checkDeviceStatus, 15000);

        } catch (error) {
            console.error("Startup Error", error);
            alert("Failed to sync. Please try logging in again.");
            logout();
        } finally {
            hideLoader();
        }
    }

    async function setupFolderAndFile() {
        if (!folderId) {
            const q = encodeURIComponent("mimeType='application/vnd.google-apps.folder' and name='JKM' and trashed=false");
            const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const data = await res.json();
            
            if (data.files && data.files.length > 0) {
                folderId = data.files[0].id;
            } else {
                const folderRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: 'JKM', mimeType: 'application/vnd.google-apps.folder' })
                });
                const folderData = await folderRes.json();
                folderId = folderData.id;
            }
            localStorage.setItem('jkm_folder_id', folderId);
        }

        if (!fileId) {
            const q = encodeURIComponent(`name='ledger_v4.json' and '${folderId}' in parents and trashed=false`);
            const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const data = await res.json();
            if (data.files && data.files.length > 0) {
                fileId = data.files[0].id;
                localStorage.setItem('jkm_file_id', fileId);
            }
        }
    }

    async function syncFromDrive() {
        if (!fileId) return;
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
            headers: { Authorization: `Bearer ${accessToken}` }
        });
        if (res.ok) {
            state = await res.json();
        }
    }

    async function checkDeviceStatus() {
        if (!fileId || !accessToken) return;
        try {
            const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            if (res.ok) {
                const cloudState = await res.json();
                if (cloudState.activeDeviceToken && cloudState.activeDeviceToken !== myDeviceToken) {
                    clearInterval(deviceCheckInterval);
                    alert("Security Alert: You have been safely logged out because your account was accessed from another device. Data is imported there.");
                    logout();
                }
            }
        } catch(e) {}
    }

    // Safely verify we are the active device before pushing data
    async function safeUploadToDrive(skipCheck = false) {
        document.getElementById('sync-status').innerText = "Syncing...";
        document.getElementById('sync-status').style.color = "var(--text)";
        
        if (!skipCheck && fileId) {
            try {
                const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${accessToken}` } });
                if (res.ok) {
                    const cloudState = await res.json();
                    if (cloudState.activeDeviceToken && cloudState.activeDeviceToken !== myDeviceToken) {
                        alert("Session Expired: You logged in from another device.");
                        logout();
                        return;
                    }
                }
            } catch (e) {} // Network error, attempt save offline
        }

        const blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
        let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
        let method = 'POST';
        
        if (fileId) {
            url = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`;
            method = 'PATCH';
        }

        const metadata = { name: 'ledger_v4.json', mimeType: 'application/json', parents: [folderId] };
        
        let body;
        if (method === 'PATCH') {
            body = blob;
        } else {
            const boundary = 'foo_bar_jkm_' + Date.now();
            body = new Blob([
                `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(metadata)}`,
                `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n`, blob, `\r\n--${boundary}--`
            ]);
        }

        const res = await fetch(url, { method, headers: { Authorization: `Bearer ${accessToken}` }, body });

        if (res.ok) {
            const data = await res.json();
            if (data.id) {
                fileId = data.id;
                localStorage.setItem('jkm_file_id', fileId);
            }
            document.getElementById('sync-status').innerText = "Cloud Synced";
            document.getElementById('sync-status').style.color = "var(--success)";
        } else {
            document.getElementById('sync-status').innerText = "Sync Failed";
            document.getElementById('sync-status').style.color = "var(--danger)";
        }
    }

    // Upload actual Image files to JKM Drive Folder
    async function uploadImageToDrive(fileBlob, fileName) {
        const metadata = { name: fileName, mimeType: 'image/jpeg', parents: [folderId] };
        const boundary = 'jkm_boundary_' + Date.now();
        const metaBlob = new Blob([JSON.stringify(metadata)], { type: 'application/json' });
        
        const body = new Blob([
            `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n`, metaBlob,
            `\r\n--${boundary}\r\nContent-Type: image/jpeg\r\n\r\n`, fileBlob,
            `\r\n--${boundary}--`
        ]);

        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
            method: 'POST',
            headers: { 
                Authorization: `Bearer ${accessToken}`,
                'Content-Type': `multipart/related; boundary=${boundary}`
            },
            body
        });
        const data = await res.json();
        return data.id;
    }

    async function getDriveImageUrl(fileId) {
        if (!fileId) return null;
        if (fileId.startsWith('data:image')) return fileId; // Legacy base64 support
        if (imageCache[fileId]) return imageCache[fileId]; // Prevent re-fetching

        try {
            const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${accessToken}` }});
            if (!res.ok) return null;
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            imageCache[fileId] = url;
            return url;
        } catch (e) { return null; }
    }

    // --- APP UI LOGIC ---
    function render() {
        // Admin
        if (state.admin.name) document.getElementById('greeting').innerText = `Accounts (${state.admin.name})`;
        if (state.admin.pic) {
            getDriveImageUrl(state.admin.pic).then(url => {
                if(url) {
                    const navPic = document.getElementById('nav-avatar');
                    navPic.src = url;
                    navPic.style.display = 'block';
                }
            });
        }
        renderUsers();
    }

    function renderUsers() {
        const container = document.getElementById('user-container');
        container.innerHTML = '';

        state.users.forEach(u => {
            const isRed = u.balance < 0;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="user-row" onclick="openUserDashboard(${u.id})">
                    <img id="list-pic-${u.id}" src="${DEFAULT_PIC}" class="avatar">
                    <div style="flex-grow: 1;">
                        <strong style="font-size: 16px;">${u.name}</strong><br>
                        <span style="font-size: 12px; color: #65676B;">${u.phone || 'No phone'}</span>
                    </div>
                    <div style="text-align: right;">
                        <div style="color: ${isRed ? 'var(--danger)' : 'var(--success)'}; font-weight: bold; font-size: 18px;">
                            ₹${Math.abs(u.balance)}
                        </div>
                        <span style="font-size: 10px; color: #65676B;">${isRed ? 'PAYABLE' : 'RECEIVABLE'}</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
            
            if (u.pic) {
                getDriveImageUrl(u.pic).then(url => {
                    if (url) document.getElementById(`list-pic-${u.id}`).src = url;
                });
            }
        });
    }

    // --- USER DASHBOARD VIEWS ---
    function openUserDashboard(id) {
        currentUserId = id;
        document.getElementById('dashboard-view').classList.add('hidden');
        document.getElementById('user-dashboard-view').classList.remove('hidden');
        renderUserDashboard();
    }

    function goBackToDashboard() {
        currentUserId = null;
        document.getElementById('user-dashboard-view').classList.add('hidden');
        document.getElementById('dashboard-view').classList.remove('hidden');
        renderUsers();
    }

    function renderUserDashboard() {
        const user = state.users.find(u => u.id === currentUserId);
        if (!user) return goBackToDashboard();
        
        document.getElementById('user-dash-name').innerText = user.name + " ✎";
        document.getElementById('user-dash-pic').src = DEFAULT_PIC;
        if (user.pic) {
            getDriveImageUrl(user.pic).then(url => {
                if (url) document.getElementById('user-dash-pic').src = url;
            });
        }

        const isRed = user.balance < 0;
        const balEl = document.getElementById('user-dash-balance');
        balEl.innerText = `₹${Math.abs(user.balance)}`;
        balEl.style.color = isRed ? 'var(--danger)' : 'var(--success)';
        
        const statEl = document.getElementById('user-dash-status');
        statEl.innerText = isRed ? 'YOU OWE' : 'OWES YOU';
        statEl.style.color = isRed ? 'var(--danger)' : 'var(--success)';

        const list = document.getElementById('transaction-list');
        list.innerHTML = '';
        if (!user.history || user.history.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#65676B; padding: 20px;">No transactions yet.</p>';
        } else {
            const sorted = [...user.history].sort((a,b) => new Date(b.date) - new Date(a.date));
            sorted.forEach(tx => {
                const isGive = tx.type === 'give';
                list.innerHTML += `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding: 15px; margin-bottom: 10px;">
                        <div>
                            <strong style="font-size: 16px;">${tx.note || 'No Narration'}</strong><br>
                            <span style="font-size: 12px; color: #65676B;">${new Date(tx.date).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}</span>
                        </div>
                        <div style="color: ${isGive ? 'var(--danger)' : 'var(--success)'}; font-weight: bold; font-size: 18px;">
                            ${isGive ? '-' : '+'}₹${tx.amount}
                        </div>
                    </div>
                `;
            });
        }
    }

    async function addEntry(type) {
        const amt = parseFloat(prompt("Enter Amount:"));
        if (isNaN(amt) || amt <= 0) return;
        const note = prompt("Narration:");
        
        const user = state.users.find(u => u.id === currentUserId);
        user.balance += (type === 'receive' ? amt : -amt);
        if(!user.history) user.history =[];
        user.history.push({ date: new Date().toISOString(), amount: amt, note, type });
        
        renderUserDashboard(); // Visual update instantly
        await safeUploadToDrive();
    }

    // --- MODALS & PROFILES ---
    function openSettings() {
        document.getElementById('admin-name').value = state.admin.name || '';
        document.getElementById('admin-email').value = state.admin.email || '';
        document.getElementById('admin-phone').value = state.admin.phone || '';
        document.getElementById('admin-address').value = state.admin.address || '';
        document.getElementById('theme-toggle').checked = (state.theme === 'dark');
        
        const preview = document.getElementById('admin-pic-preview');
        preview.src = DEFAULT_PIC;
        if (state.admin.pic) getDriveImageUrl(state.admin.pic).then(url => { if(url) preview.src = url; });

        document.getElementById('settings-modal').classList.remove('hidden');
    }

    async function saveSettings() {
        showLoader("Saving Settings...");
        if (pendingAdminPic) {
            const fileId = await uploadImageToDrive(pendingAdminPic, 'admin_profile.jpg');
            state.admin.pic = fileId;
            pendingAdminPic = null;
        }

        state.admin.name = document.getElementById('admin-name').value;
        state.admin.email = document.getElementById('admin-email').value;
        state.admin.phone = document.getElementById('admin-phone').value;
        state.admin.address = document.getElementById('admin-address').value;
        
        state.theme = document.getElementById('theme-toggle').checked ? 'dark' : 'light';
        applyTheme();
        
        closeModal('settings-modal');
        await safeUploadToDrive();
        render();
        hideLoader();
    }

    function openUserModal(id = null) {
        document.getElementById('user-modal').classList.remove('hidden');
        const delBtn = document.getElementById('delete-user-btn');
        const preview = document.getElementById('user-pic-preview');
        preview.src = DEFAULT_PIC;

        if (id) {
            const u = state.users.find(x => x.id === parseInt(id));
            document.getElementById('user-modal-title').innerText = "Edit Client";
            document.getElementById('editing-user-id').value = id;
            document.getElementById('user-name').value = u.name;
            document.getElementById('user-email').value = u.email || '';
            document.getElementById('user-phone').value = u.phone || '';
            document.getElementById('user-address').value = u.address || '';
            
            if (u.pic) getDriveImageUrl(u.pic).then(url => { if(url) preview.src = url; });
            
            // Only allow deletion if balance is settled
            if (u.balance === 0) delBtn.classList.remove('hidden');
            else delBtn.classList.add('hidden');
        } else {
            document.getElementById('user-modal-title').innerText = "Add New Client";
            document.getElementById('editing-user-id').value = '';
            document.getElementById('user-name').value = '';
            document.getElementById('user-email').value = '';
            document.getElementById('user-phone').value = '';
            document.getElementById('user-address').value = '';
            delBtn.classList.add('hidden');
        }
    }

    async function saveUser() {
        const name = document.getElementById('user-name').value;
        if (!name) return alert("Name is required");

        showLoader("Saving Client...");
        let newPicId = null;
        if (pendingUserPic) {
            newPicId = await uploadImageToDrive(pendingUserPic, `${name.replace(' ', '_')}_profile.jpg`);
            pendingUserPic = null;
        }

        const id = document.getElementById('editing-user-id').value;
        const details = {
            name,
            email: document.getElementById('user-email').value,
            phone: document.getElementById('user-phone').value,
            address: document.getElementById('user-address').value
        };

        if (id) {
            const idx = state.users.findIndex(u => u.id === parseInt(id));
            if (newPicId) details.pic = newPicId;
            state.users[idx] = { ...state.users[idx], ...details };
        } else {
            state.users.push({ id: Date.now(), balance: 0, history:[], pic: newPicId, ...details });
        }
        
        closeModal('user-modal');
        await safeUploadToDrive();
        
        if (currentUserId) renderUserDashboard(); 
        else renderUsers();
        hideLoader();
    }

    async function deleteCurrentUser() {
        const id = parseInt(document.getElementById('editing-user-id').value);
        if (confirm("Delete this client permanently?")) {
            state.users = state.users.filter(u => u.id !== id);
            closeModal('user-modal');
            goBackToDashboard();
            await safeUploadToDrive();
        }
    }

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    function applyTheme() { document.body.setAttribute('data-theme', state.theme); }
    function showLoader(text) { document.getElementById('loader-text').innerText = text; document.getElementById('loader').classList.remove('hidden'); }
    function hideLoader() { document.getElementById('loader').classList.add('hidden'); }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    // Prepare images for real Drive file upload instead of bloated JSON base64
    function processImage(input, previewId, type) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_SIZE = 400; // Better quality since stored externally
                let width = img.width, height = img.height;
                if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // Show instant preview
                document.getElementById(previewId).src = canvas.toDataURL('image/jpeg', 0.8);
                
                // Save blob for uploading during "Save" click
                canvas.toBlob((blob) => {
                    if (type === 'admin') pendingAdminPic = blob;
                    else pendingUserPic = blob;
                }, 'image/jpeg', 0.8);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
