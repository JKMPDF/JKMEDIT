<!DOCTYPE html>
<html lang="en" x-data="studyOS()" x-init="init()" :class="darkMode ? 'dark' : ''">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6366f1', secondary: '#10b981', accent: '#f59e0b', darkbg: '#0f172a', darkcard: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        html, body { 
            overscroll-behavior-y: contain; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
        }
        .dark body { background-color: #0f172a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media (max-width: 768px) { 
            .mobile-hide { display: none !important; } 
            .mobile-panel { position: fixed; inset: 0; z-index: 150; background: white; overflow-y: auto; }
            .dark .mobile-panel { background: #0f172a; }
        }
        .timer-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .alert-critical { border: 2px solid #ef4444; animation: pulse 2s infinite; }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100 min-h-screen pb-24 md:pb-0 md:pl-20">

    <!-- SYNCING OVERLAY -->
    <div x-show="loading" class="fixed inset-0 z-[2000] bg-white dark:bg-darkbg flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black uppercase tracking-widest opacity-50">JKM Architect Syncing...</p>
    </div>

    <!-- STARTUP SCREEN -->
    <div x-show="!appStarted && !loading" class="fixed inset-0 z-[1000] bg-white dark:bg-darkbg flex items-center justify-center p-6 text-center">
        <div class="max-w-md w-full space-y-8">
            <h1 class="text-8xl font-black text-primary tracking-tighter">JKM</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">Target Study System</p>
            <div class="flex flex-col gap-4">
                <button @click="startWithBackup(true)" class="p-6 bg-primary text-white rounded-3xl font-black shadow-xl hover:scale-105 transition">
                    <i class="fab fa-google mr-2"></i> Cloud Login
                </button>
                <button @click="startWithoutBackup()" class="p-6 bg-slate-100 dark:bg-darkcard rounded-3xl font-bold hover:bg-slate-200 transition text-slate-600">
                    Offline Mode
                </button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR (DESKTOP) -->
    <aside x-show="appStarted" class="fixed left-0 top-0 h-screen w-20 bg-slate-900 hidden md:flex flex-col items-center py-8 z-50">
        <div class="mb-10 text-primary font-black text-xl">JKM</div>
        <div class="flex flex-col gap-8 flex-1">
            <button @click="view = 'dash'" :class="view === 'dash' ? 'text-white' : 'text-slate-500'"><i class="fas fa-home text-xl"></i></button>
            <button @click="view = 'library'" :class="view === 'library' ? 'text-white' : 'text-slate-500'"><i class="fas fa-book text-xl"></i></button>
            <button @click="view = 'settings'" :class="view === 'settings' ? 'text-white' : 'text-slate-500'"><i class="fas fa-cog text-xl"></i></button>
        </div>
        <button @click="darkMode = !darkMode" class="text-slate-400 mb-4"><i :class="darkMode ? 'fa-sun' : 'fa-moon'" class="fas"></i></button>
    </aside>

    <!-- MOBILE NAV -->
    <nav x-show="appStarted" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-darkcard border-t dark:border-slate-800 flex md:hidden justify-around items-center py-4 z-[100] shadow-2xl">
        <button @click="view = 'dash'" :class="view === 'dash' ? 'text-primary' : 'text-slate-400'"><i class="fas fa-home text-2xl"></i></button>
        <button @click="view = 'library'" :class="view === 'library' ? 'text-primary' : 'text-slate-400'"><i class="fas fa-book text-2xl"></i></button>
        <button @click="showAddSubject = true" class="bg-primary text-white w-14 h-14 rounded-full -mt-12 shadow-lg flex items-center justify-center border-4 border-slate-50 dark:border-darkbg"><i class="fas fa-plus text-xl"></i></button>
        <button @click="view = 'settings'" :class="view === 'settings' ? 'text-primary' : 'text-slate-400'"><i class="fas fa-cog text-2xl"></i></button>
        <button @click="darkMode = !darkMode"><i :class="darkMode ? 'fa-sun' : 'fa-moon'" class="fas text-2xl text-slate-400"></i></button>
    </nav>

    <main x-show="appStarted" class="p-4 md:p-8 max-w-7xl mx-auto">
        
        <!-- DASHBOARD -->
        <div x-show="view === 'dash'" x-transition x-cloak class="space-y-6 pb-10">
            
            <header class="flex justify-between items-center">
                <h1 class="text-3xl font-black">Dashboard</h1>
                <div x-show="useCloud" class="text-right">
                    <div class="flex items-center gap-2 bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">
                        <i class="fas fa-sync-alt" :class="syncing ? 'animate-spin' : ''" @click="forceSync(true)"></i>
                        <span x-text="syncing ? 'Syncing...' : 'Cloud Active'"></span>
                    </div>
                </div>
            </header>

            <!-- POMODORO TIMER CARD (DASHBOARD ONLY) -->
            <div class="bg-white dark:bg-darkcard rounded-[2.5rem] p-6 border dark:border-slate-800 timer-glow text-center relative overflow-hidden">
                <div x-show="timerActive" class="absolute top-4 left-1/2 -translate-x-1/2 text-[10px] font-black text-primary uppercase tracking-widest animate-pulse">
                    Focus Mode • Music Playing
                </div>
                <div class="text-7xl font-black text-primary tabular-nums mb-4 mt-4" x-text="formatTime(timerSeconds)"></div>
                
                <div class="flex justify-center gap-4">
                    <button @click="toggleTimer()" :class="timerActive ? 'bg-red-500' : 'bg-primary'" 
                            class="px-8 py-3 rounded-2xl text-white font-black uppercase text-xs shadow-lg transition-all active:scale-95">
                        <span x-text="timerActive ? 'Pause' : 'Start Focus'"></span>
                    </button>
                    <button @click="resetTimer()" class="bg-slate-100 dark:bg-slate-800 text-slate-500 px-6 py-3 rounded-2xl font-black uppercase text-xs">
                        Reset
                    </button>
                </div>
            </div>

            <!-- EXAM & GOAL STATS -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-primary p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden">
                    <p class="text-[10px] font-black uppercase opacity-60 mb-1">Target Daily Goal</p>
                    <h2 class="text-4xl font-black" x-text="getDailyGoal() + 'h'"><span class="text-xs opacity-60 ml-2">needed today</span></h2>
                    <div class="mt-4 flex gap-4 text-[10px] font-bold">
                        <span><i class="fas fa-calendar mr-1"></i> <span x-text="getDaysUntilExam()"></span> Days Left</span>
                        <span><i class="fas fa-clock mr-1"></i> <span x-text="getRemainingHours()"></span>h Remaining</span>
                    </div>
                    <i class="fas fa-bullseye absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
                </div>
                <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800 flex flex-col justify-center">
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-2">Set Exam Date</label>
                    <input type="date" x-model="examDate" @change="forceSync(true)" class="w-full bg-slate-50 dark:bg-slate-900 border-none rounded-xl p-3 font-black text-primary">
                </div>
            </div>

            <!-- PROGRESS ANALYTICS -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <h3 class="text-xl font-black">Course Progress</h3>
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2.5rem] border dark:border-slate-800 max-h-64 overflow-y-auto no-scrollbar space-y-4">
                        <template x-for="sub in subjects">
                            <div>
                                <div class="flex justify-between mb-1">
                                    <span class="text-xs font-black uppercase" x-text="sub.name"></span>
                                    <span class="text-[10px] font-black text-primary" x-text="getSubjectProgress(sub) + '%'"></span>
                                </div>
                                <div class="w-full bg-slate-100 dark:bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                    <div class="bg-primary h-full rounded-full" :style="'width: ' + getSubjectProgress(sub) + '%'"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xl font-black">Revision Queue</h3>
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2.5rem] border dark:border-slate-800 h-64 overflow-y-auto no-scrollbar">
                        <template x-for="alert in getRevisionAlerts()" :key="alert.id">
                            <div :class="alert.isCritical ? 'alert-critical' : 'border dark:border-slate-800'" class="flex items-center gap-3 p-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl mb-2 border">
                                <div class="flex-1">
                                    <p class="text-[10px] font-black text-primary uppercase" x-text="alert.subject"></p>
                                    <p class="text-sm font-black" x-text="alert.chapter"></p>
                                </div>
                                <template x-if="!dismissingIds.includes(alert.id)">
                                    <button @click="startDismissal(alert.id)" class="bg-secondary text-white px-3 py-2 rounded-xl text-[10px] font-black uppercase">Done</button>
                                </template>
                                <template x-if="dismissingIds.includes(alert.id)">
                                    <button @click="cancelDismissal(alert.id)" class="text-[10px] font-black text-red-500 uppercase underline">Undo</button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- LIBRARY -->
        <div x-show="view === 'library'" x-transition x-cloak class="space-y-8 pb-10">
            <h2 class="text-3xl font-black">Library</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="(sub, sIdx) in subjects" :key="sub.id">
                    <div @click="openSubject(sub)" class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800 relative group cursor-pointer">
                        <div class="absolute top-0 left-0 w-1.5 h-full bg-primary"></div>
                        <h3 class="text-xl font-black mb-1" x-text="sub.name"></h3>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest" x-text="(sub.chapters?.length || 0) + ' Chapters'"></p>
                        <button @click.stop="deleteSubject(sIdx)" class="absolute top-6 right-6 text-slate-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </template>
            </div>
        </div>

        <!-- SUBJECT DETAIL (CHAPTERS, AUDIO, RECALL) -->
        <div x-show="view === 'subjectDetail'" x-transition x-cloak class="h-[calc(100vh-160px)] -mx-4 md:-mx-8 border-y dark:border-slate-800 bg-white dark:bg-darkcard flex overflow-hidden">
            <!-- Sidebar: Chapter List -->
            <div class="w-full md:w-80 border-r dark:border-slate-800 flex flex-col" :class="activeChapter ? 'mobile-hide' : 'flex'">
                <div class="p-4 flex justify-between items-center border-b dark:border-slate-800">
                    <button @click="view = 'library'; forceSync(true);" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
                    <span class="text-[10px] font-black uppercase" x-text="activeSubject?.name"></span>
                    <button @click="addChapter()" class="text-primary font-bold text-xl">+</button>
                </div>
                <div class="flex-1 overflow-y-auto no-scrollbar">
                    <template x-for="chapter in activeSubject?.chapters" :key="chapter.id">
                        <div @click="activeChapter = chapter" :class="activeChapter?.id === chapter.id ? 'bg-indigo-50 dark:bg-indigo-900/20 border-r-4 border-primary' : ''" class="p-4 border-b dark:border-slate-800">
                            <h4 class="font-bold text-sm truncate" x-text="chapter.title"></h4>
                            <div class="flex gap-0.5 mt-1">
                                <template x-for="r in 5">
                                    <div :class="chapter.revisions >= r ? 'bg-secondary' : 'bg-slate-200 dark:bg-slate-700'" class="h-1 flex-1 rounded-full"></div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Content: Chapter Details -->
            <div x-show="activeChapter" class="flex-1 overflow-y-auto p-4 md:p-10 bg-slate-50/50 dark:bg-darkbg/30 relative" :class="activeChapter ? 'mobile-panel' : ''">
                <button @click="activeChapter = null; stopAudio(); forceSync(true);" class="md:hidden text-primary font-black mb-6"><i class="fas fa-arrow-left"></i> Back</button>
                
                <div class="max-w-4xl mx-auto space-y-6 pb-20">
                    <div class="flex flex-col md:flex-row justify-between gap-4">
                        <input type="text" x-model="activeChapter.title" @input="forceSync()" class="bg-transparent border-none text-3xl font-black focus:ring-0 p-0 w-full">
                        <div class="flex items-center gap-2">
                            <input type="number" x-model="activeChapter.hours" @input="forceSync()" class="w-12 bg-slate-100 dark:bg-slate-800 rounded-lg p-2 text-sm font-black text-center">
                            <button @click="activeChapter.done = !activeChapter.done; forceSync(true);" :class="activeChapter.done ? 'bg-secondary text-white' : 'bg-slate-200 dark:bg-slate-700'" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase">Done</button>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                        <h4 class="text-[10px] font-black uppercase text-slate-400 mb-4">Mastery Dots</h4>
                        <div class="flex gap-2">
                            <template x-for="r in 5">
                                <button @click="toggleRevision(activeChapter, r); forceSync(true);" :class="activeChapter.revisions >= r ? 'bg-secondary' : 'bg-slate-100 dark:bg-slate-800'" class="h-4 flex-1 rounded-full border dark:border-slate-700"></button>
                            </template>
                        </div>
                    </div>

                    <!-- AUDIO RECORDINGS -->
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-[10px] font-black uppercase text-slate-400">Audio Memos</h4>
                            <button @click="isRecording ? stopRecording() : startRecording()" :class="isRecording ? 'bg-red-500 animate-pulse' : 'bg-primary'" class="w-10 h-10 rounded-full text-white"><i class="fas" :class="isRecording ? 'fa-stop' : 'fa-microphone'"></i></button>
                        </div>
                        <template x-for="(rec, idx) in activeChapter.recordings || []" :key="idx">
                            <div class="flex items-center gap-4 bg-slate-50 dark:bg-slate-900 p-3 rounded-2xl mb-2">
                                <button @click="toggleAudio(rec, idx)" class="text-primary text-xl"><i class="fas" :class="(audioPlaying && currentAudioIdx === idx) ? 'fa-pause-circle' : 'fa-play-circle'"></i></button>
                                <div class="flex-1 h-1 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
                                <button @click="deleteRecording(idx)" class="text-red-400"><i class="fas fa-trash-alt text-xs"></i></button>
                            </div>
                        </template>
                    </div>

                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                        <h4 class="text-[10px] font-black uppercase text-slate-400 mb-2">Detailed Notes</h4>
                        <textarea x-model="activeChapter.notes" @input="forceSync()" class="w-full h-40 bg-transparent border-none text-sm leading-relaxed resize-none focus:ring-0" placeholder="Summary..."></textarea>
                    </div>

                    <!-- ACTIVE RECALL -->
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                        <h4 class="text-[10px] font-black uppercase text-slate-400 mb-4">Active Recall Links</h4>
                        <template x-for="(q, qIdx) in activeChapter.questions || []" :key="qIdx">
                            <div class="mb-4 border-b dark:border-slate-800 pb-4">
                                <div class="flex gap-2">
                                    <input type="checkbox" x-model="q.done" @change="forceSync(true)" class="rounded-full">
                                    <input type="text" x-model="q.text" @input="forceSync()" placeholder="Question..." class="flex-1 bg-transparent border-none text-sm font-bold focus:ring-0">
                                </div>
                                <div class="flex items-center gap-2 mt-2 pl-6">
                                    <input type="text" x-model="q.url" @input="forceSync()" placeholder="Reference URL..." class="flex-1 bg-slate-50 dark:bg-slate-900 p-2 rounded-lg text-[10px]">
                                    <template x-if="q.url"><a :href="q.url" target="_blank" class="text-primary text-[10px] font-black">OPEN</a></template>
                                </div>
                            </div>
                        </template>
                        <button @click="activeChapter.questions.push({text:'', done:false, url:''}); forceSync(true);" class="text-primary text-[10px] font-black uppercase">+ New Recall Link</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SETTINGS -->
        <div x-show="view === 'settings'" x-transition x-cloak class="max-w-2xl mx-auto space-y-6 pb-20">
            <h2 class="text-3xl font-black">Settings</h2>
            <div class="bg-white dark:bg-darkcard p-6 rounded-[2.5rem] border dark:border-slate-800 space-y-6">
                <button @click="downloadTemplate()" class="w-full p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl text-left flex justify-between items-center">
                    <span class="font-bold">Export Excel Backup</span>
                    <i class="fas fa-download text-primary"></i>
                </button>
                <button @click="triggerImport()" class="w-full p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl text-left flex justify-between items-center">
                    <span class="font-bold">Import Excel Data</span>
                    <i class="fas fa-upload text-secondary"></i>
                </button>
                <button @click="deleteAllData()" class="w-full p-4 bg-red-500 text-white rounded-2xl font-black uppercase text-xs">Delete All (Cloud & Local)</button>
            </div>
        </div>
    </main>

    <!-- NEW SUBJECT MODAL -->
    <div x-cloak x-show="showAddSubject" class="fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div @click="showAddSubject = false" class="absolute inset-0 bg-slate-900/60 backdrop-blur-md"></div>
        <div class="relative bg-white dark:bg-darkcard p-8 rounded-[3rem] w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-black mb-6">New Subject</h2>
            <input type="text" x-model="newSub.name" placeholder="Subject Name" class="w-full p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl border-none font-bold text-center mb-6">
            <button @click="createSubject(); forceSync(true);" class="w-full py-5 bg-primary text-white rounded-3xl font-black shadow-xl uppercase">Start Course</button>
        </div>
    </div>

    <audio id="focusMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <input type="file" id="excelFile" class="hidden" @change="handleImport">

    <script>
        const CLIENT_ID = '994815938069-amhjk8t195flo04e73unb6d1bgrtpbep.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        function studyOS() {
            return {
                view: 'dash', appStarted: false, loading: false, syncing: false, needsSync: false,
                syncTimer: null, lastSyncTime: 'Never', useCloud: false, darkMode: false,
                subjects: [], activeSubject: null, activeChapter: null, showAddSubject: false,
                newSub: { name: '' }, streak: 0, timerSeconds: 1500, timerActive: false,
                timerInterval: null, googleToken: null, driveFolderId: null, driveFileId: null,
                isRecording: false, mediaRecorder: null, audioChunks: [], audioInstance: null, audioPlaying: false,
                currentAudioIdx: null, audioDuration: 0, audioCurrentTime: 0,
                
                examDate: '', dismissingIds: [], wakeLock: null,

                init() {
                    const saved = localStorage.getItem('titan_os_ultimate_final');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.subjects = data.subjects || [];
                        this.examDate = data.examDate || '';
                    }
                    this.checkStreak();
                    this.darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    if (localStorage.getItem('use_cloud_sync') === 'true') this.startWithBackup(false);
                },

                forceSync(immediate = false) {
                    const data = { subjects: this.subjects, examDate: this.examDate };
                    localStorage.setItem('titan_os_ultimate_final', JSON.stringify(data));
                    if (!this.useCloud) return;
                    if (this.syncTimer) clearTimeout(this.syncTimer);
                    if (immediate) this.syncToCloud();
                    else this.syncTimer = setTimeout(() => this.syncToCloud(), 2000);
                },

                // EXAM LOGIC
                getDaysUntilExam() {
                    if (!this.examDate) return 0;
                    const diff = new Date(this.examDate) - new Date();
                    return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
                },
                getRemainingHours() {
                    return this.subjects.reduce((sum, sub) => sum + sub.chapters.filter(c => !c.done).reduce((s, c) => s + parseFloat(c.hours || 0), 0), 0);
                },
                getDailyGoal() {
                    const days = this.getDaysUntilExam();
                    return days > 0 ? (this.getRemainingHours() / days).toFixed(1) : 0;
                },

                // REVISION SYSTEM
                getRevisionAlerts() {
                    const alerts = [];
                    this.subjects.forEach(s => s.chapters?.forEach(c => {
                        const diff = (new Date() - new Date(c.lastRevised || c.id)) / (1000 * 60 * 60 * 24);
                        if (diff > 3 && !c.done) alerts.push({ id: c.id, subject: s.name, chapter: c.title, isCritical: diff > 5, ref: c });
                    }));
                    return alerts;
                },
                startDismissal(id) {
                    this.dismissingIds.push(id);
                    setTimeout(() => {
                        if (this.dismissingIds.includes(id)) {
                            const alert = this.getRevisionAlerts().find(a => a.id === id);
                            if (alert) {
                                alert.ref.revisions = Math.min(5, (alert.ref.revisions || 0) + 1);
                                alert.ref.lastRevised = new Date();
                                this.dismissingIds = this.dismissingIds.filter(i => i !== id);
                                this.forceSync(true);
                            }
                        }
                    }, 30000);
                },
                cancelDismissal(id) { this.dismissingIds = this.dismissingIds.filter(i => i !== id); },

                // TIMER & WAKE LOCK
                async toggleTimer() {
                    const music = document.getElementById('focusMusic');
                    if (this.timerActive) {
                        clearInterval(this.timerInterval); this.timerActive = false; music.pause();
                        if (this.wakeLock) { this.wakeLock.release(); this.wakeLock = null; }
                    } else {
                        this.timerActive = true; music.play();
                        if ('wakeLock' in navigator) try { this.wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
                        this.timerInterval = setInterval(() => { if (this.timerSeconds > 0) this.timerSeconds--; else this.toggleTimer(); }, 1000);
                    }
                },
                resetTimer() { this.timerSeconds = 1500; this.timerActive = false; clearInterval(this.timerInterval); document.getElementById('focusMusic').pause(); },

                // ROBUST SYNC (Ledger Method)
                async startWithBackup(interactive = true) {
                    this.loading = true;
                    const client = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID, scope: SCOPES,
                        callback: async (res) => {
                            if (res.error) { this.loading = false; return; }
                            this.googleToken = res.access_token;
                            await this.initializeCloudSync();
                            this.useCloud = true; this.appStarted = true; this.loading = false;
                            localStorage.setItem('use_cloud_sync', 'true');
                        },
                    });
                    interactive ? client.requestAccessToken() : client.requestAccessToken({ prompt: 'none' });
                },
                startWithoutBackup() { this.appStarted = true; localStorage.setItem('use_cloud_sync', 'false'); },
                logout() { localStorage.setItem('use_cloud_sync', 'false'); location.reload(); },

                async initializeCloudSync() {
                    await new Promise(r => gapi.load('client', r));
                    const headers = { Authorization: `Bearer ${this.googleToken}` };
                    const fQuery = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("name='JKM Study' and mimeType='application/vnd.google-apps.folder' and trashed=false")}`, { headers });
                    const fData = await fQuery.json();
                    if (fData.files?.length > 0) this.driveFolderId = fData.files[0].id;
                    else {
                        const res = await fetch('https://www.googleapis.com/drive/v3/files', { method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' }, body: JSON.stringify({ name: 'JKM Study', mimeType: 'application/vnd.google-apps.folder' }) });
                        this.driveFolderId = (await res.json()).id;
                    }
                    const bQuery = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${this.driveFolderId}' in parents and name='backup.json' and trashed=false`)}`, { headers });
                    const bData = await bQuery.json();
                    if (bData.files?.length > 0) {
                        this.driveFileId = bData.files[0].id;
                        const cloudRes = await fetch(`https://www.googleapis.com/drive/v3/files/${this.driveFileId}?alt=media`, { headers });
                        const cloudData = await cloudRes.json();
                        if (cloudData) { this.subjects = cloudData.subjects || []; this.examDate = cloudData.examDate || ''; }
                    }
                },

                async syncToCloud() {
                    if (!this.googleToken || !this.driveFolderId) return;
                    if (this.syncing) { this.needsSync = true; return; }
                    this.syncing = true; this.needsSync = false;
                    try {
                        const boundary = 'jkm_boundary';
                        const metadata = { name: 'backup.json', mimeType: 'application/json' };
                        if (!this.driveFileId) metadata.parents = [this.driveFolderId];
                        const payload = { subjects: this.subjects, examDate: this.examDate };
                        const body = `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(payload)}\r\n--${boundary}--`;
                        const url = this.driveFileId ? `https://www.googleapis.com/upload/drive/v3/files/${this.driveFileId}?uploadType=multipart` : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
                        const res = await fetch(url, { method: this.driveFileId ? 'PATCH' : 'POST', headers: { Authorization: `Bearer ${this.googleToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` }, body });
                        const data = await res.json();
                        if (data.id) { this.driveFileId = data.id; this.lastSyncTime = new Date().toLocaleTimeString(); }
                    } catch(e) {} finally { this.syncing = false; if (this.needsSync) this.syncToCloud(); }
                },

                // UTILITIES
                formatTime(sec) { return `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`; },
                getSubjectProgress(sub) { return sub.chapters?.length ? Math.round((sub.chapters.filter(c => c.done).length / sub.chapters.length) * 100) : 0; },
                createSubject() { if (!this.newSub.name) return; this.subjects.push({ id: Date.now(), name: this.newSub.name, chapters: [] }); this.newSub.name = ''; this.showAddSubject = false; this.forceSync(true); },
                deleteSubject(idx) { if(confirm('Delete?')) { this.subjects.splice(idx, 1); this.forceSync(true); } },
                openSubject(sub) { this.activeSubject = sub; this.view = 'subjectDetail'; this.activeChapter = null; },
                addChapter() { const ch = { id: Date.now(), title: 'New', hours: 0, done: false, revisions: 0, recordings: [], questions: [], lastRevised: new Date() }; this.activeSubject.chapters.push(ch); this.activeChapter = ch; this.forceSync(true); },
                
                async startRecording() {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        this.mediaRecorder = new MediaRecorder(stream);
                        this.audioChunks = [];
                        this.mediaRecorder.ondataavailable = e => this.audioChunks.push(e.data);
                        this.mediaRecorder.onstop = () => {
                            const reader = new FileReader();
                            reader.readAsDataURL(new Blob(this.audioChunks, { type: 'audio/webm' }));
                            reader.onloadend = () => { if(!this.activeChapter.recordings) this.activeChapter.recordings = []; this.activeChapter.recordings.push(reader.result); this.forceSync(true); };
                        };
                        this.mediaRecorder.start(); this.isRecording = true;
                    } catch (e) { alert('Mic access error.'); }
                },
                stopRecording() { if(this.mediaRecorder) { this.mediaRecorder.stop(); this.isRecording = false; } },
                toggleAudio(base64, idx) {
                    if (this.audioPlaying && this.currentAudioIdx === idx) { this.audioInstance.pause(); this.audioPlaying = false; }
                    else { if(this.audioInstance) this.audioInstance.pause(); this.currentAudioIdx = idx; this.audioInstance = new Audio(base64); this.audioInstance.play(); this.audioPlaying = true; }
                },
                stopAudio() { if(this.audioInstance) this.audioInstance.pause(); this.audioPlaying = false; },
                deleteRecording(idx) { if(confirm("Delete?")) { this.activeChapter.recordings.splice(idx, 1); this.forceSync(true); } },
                checkStreak() {
                    const last = localStorage.getItem('last_active');
                    const today = new Date().toDateString();
                    if (last === today) this.streak = parseInt(localStorage.getItem('streak_count') || 1);
                    else { this.streak = (last === new Date(Date.now() - 86400000).toDateString()) ? parseInt(localStorage.getItem('streak_count') || 0) + 1 : 1; }
                    localStorage.setItem('streak_count', this.streak); localStorage.setItem('last_active', today);
                },
                downloadTemplate() {
                    const rows = [];
                    this.subjects.forEach(s => s.chapters?.forEach(c => rows.push({ Subject: s.name, Chapter: c.title, Hours: c.hours })));
                    const ws = XLSX.utils.json_to_sheet(rows);
                    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Library");
                    XLSX.writeFile(wb, "JKM_Study_Backup.xlsx");
                },
                triggerImport() { document.getElementById('excelFile').click(); },
                handleImport(e) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                        rows.forEach(r => {
                            let sub = this.subjects.find(s => s.name === r.Subject);
                            if (!sub) { sub = { id: Date.now() + Math.random(), name: r.Subject, chapters: [] }; this.subjects.push(sub); }
                            sub.chapters.push({ id: Math.random(), title: r.Chapter, hours: parseFloat(r.Hours || 0), done: false, revisions: 0, recordings: [], questions: [], lastRevised: new Date() });
                        });
                        this.forceSync(true);
                    };
                    reader.readAsBinaryString(e.target.files[0]);
                },
                toggleRevision(ch, level) { ch.revisions = (ch.revisions === level) ? level - 1 : level; ch.lastRevised = new Date(); this.forceSync(true); },
                deleteAllData() { if(confirm('Erase?')) { localStorage.clear(); location.reload(); } }
            }
        }
    </script>
