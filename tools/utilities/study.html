<!DOCTYPE html>
<html lang="en" x-data="studyOS()" x-init="init()" :class="darkMode ? 'dark' : ''">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6366f1', secondary: '#10b981', accent: '#f59e0b', darkbg: '#0f172a', darkcard: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        html, body { overscroll-behavior-y: contain; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media (max-width: 768px) { 
            .mobile-hide { display: none !important; } 
            .mobile-panel { position: fixed; inset: 0; z-index: 150; background: white; overflow-y: auto; }
            .dark .mobile-panel { background: #0f172a; }
        }
        input[type="range"] { accent-color: #6366f1; }
        .alert-urgent { border-left: 4px solid #ef4444 !important; background: #fef2f2 !important; }
        .dark .alert-urgent { background: #450a0a !important; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkbg text-slate-900 dark:text-slate-100 min-h-screen pb-20 md:pb-0 md:pl-20">

    <!-- SYNCING OVERLAY -->
    <div x-show="loading" class="fixed inset-0 z-[2000] bg-white dark:bg-darkbg flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black uppercase tracking-widest opacity-50">JKM Cloud Syncing Data...</p>
    </div>

    <!-- STARTUP SCREEN -->
    <div x-show="!appStarted && !loading" class="fixed inset-0 z-[1000] bg-white dark:bg-darkbg flex items-center justify-center p-6 text-center">
        <div class="max-w-md w-full space-y-8">
            <h1 class="text-8xl font-black text-primary tracking-tighter">JKM</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">The Study Architect</p>
            <div class="flex flex-col gap-4">
                <button @click="startWithBackup(true)" class="p-6 bg-primary text-white rounded-3xl font-black shadow-xl hover:scale-105 transition">
                    <i class="fab fa-google mr-2"></i> Cloud Sync (Google Drive)
                </button>
                <button @click="startWithoutBackup()" class="p-6 bg-slate-100 dark:bg-darkcard rounded-3xl font-bold hover:bg-slate-200 transition text-slate-600">
                    Local Mode Only
                </button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside x-show="appStarted" class="fixed left-0 top-0 h-screen w-20 bg-slate-900 hidden md:flex flex-col items-center py-8 z-50">
        <div class="mb-10 text-primary font-black text-xl">JKM</div>
        <div class="flex flex-col gap-8 flex-1">
            <button @click="view = 'dash'" :class="view === 'dash' ? 'text-white' : 'text-slate-500'"><i class="fas fa-home text-xl"></i></button>
            <button @click="view = 'library'" :class="view === 'library' ? 'text-white' : 'text-slate-500'"><i class="fas fa-book text-xl"></i></button>
            <button @click="view = 'focus'" :class="view === 'focus' ? 'text-white' : 'text-slate-500'"><i class="fas fa-stopwatch text-xl"></i></button>
            <button @click="view = 'settings'" :class="view === 'settings' ? 'text-white' : 'text-slate-500'"><i class="fas fa-cog text-xl"></i></button>
        </div>
        <button @click="darkMode = !darkMode" class="text-slate-400 mb-4"><i :class="darkMode ? 'fa-sun' : 'fa-moon'" class="fas"></i></button>
    </aside>

    <!-- MOBILE NAV -->
    <nav x-show="appStarted" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-darkcard border-t dark:border-slate-800 flex md:hidden justify-around items-center py-3 z-[100] shadow-2xl">
        <button @click="view = 'dash'" :class="view === 'dash' ? 'text-primary' : 'text-slate-400'"><i class="fas fa-home text-xl"></i></button>
        <button @click="view = 'library'" :class="view === 'library' ? 'text-primary' : 'text-slate-400'"><i class="fas fa-book text-xl"></i></button>
        <button @click="showAddSubject = true" class="bg-primary text-white w-12 h-12 rounded-full -mt-10 shadow-lg flex items-center justify-center border-4 border-slate-50 dark:border-darkbg"><i class="fas fa-plus"></i></button>
        <button @click="view = 'settings'" :class="view === 'settings' ? 'text-primary' : 'text-slate-400'"><i class="fas fa-cog text-xl"></i></button>
        <button @click="darkMode = !darkMode"><i :class="darkMode ? 'fa-sun' : 'fa-moon'" class="fas text-xl"></i></button>
    </nav>

    <main x-show="appStarted" class="p-4 md:p-8 max-w-7xl mx-auto">
        
        <!-- DASHBOARD -->
        <div x-show="view === 'dash'" x-transition x-cloak class="space-y-6">
            <header class="flex justify-between items-center">
                <h1 class="text-3xl font-black">Dashboard</h1>
                <div class="flex items-center gap-4">
                    <div class="text-right mr-4">
                        <p class="text-[10px] font-black uppercase opacity-40">Exam Date</p>
                        <input type="date" x-model="examDate" @change="forceSync()" class="bg-transparent border-none p-0 text-sm font-black text-primary focus:ring-0">
                    </div>
                    <button @click="forceSync(true)" class="p-2 bg-white dark:bg-darkcard rounded-full shadow-sm">
                        <i class="fas fa-sync-alt text-xs" :class="syncing ? 'animate-spin text-amber-500' : 'text-emerald-500'"></i>
                    </button>
                </div>
            </header>

            <!-- STUDY GOALS SECTION -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="col-span-1 md:col-span-2 bg-primary rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-xs font-black uppercase tracking-widest opacity-70 mb-2">Target Roadmap</p>
                        <h2 class="text-4xl font-black mb-6" x-text="getDaysToExam() + ' Days Remaining'"></h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white/10 p-4 rounded-2xl">
                                <p class="text-[10px] font-bold uppercase opacity-60">Daily Study Goal</p>
                                <p class="text-2xl font-black" x-text="getDailyGoalHours() + ' Hours'"></p>
                            </div>
                            <div class="bg-white/10 p-4 rounded-2xl">
                                <p class="text-[10px] font-bold uppercase opacity-60">Chapters to Finish</p>
                                <p class="text-2xl font-black" x-text="getRemainingChapters()"></p>
                            </div>
                        </div>
                    </div>
                    <i class="fas fa-calendar-check absolute -bottom-10 -right-10 text-[12rem] opacity-10"></i>
                </div>
                <div class="bg-white dark:bg-darkcard p-8 rounded-[2.5rem] border dark:border-slate-800 flex flex-col justify-center text-center">
                    <p class="text-[10px] font-black uppercase tracking-widest opacity-40 mb-2">Overall Mastery</p>
                    <div class="text-6xl font-black text-secondary" x-text="getGlobalRevisionProgress() + '%'"></div>
                    <p class="text-xs font-bold mt-2 opacity-50">Course Proficiency</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
                <!-- PERFORMANCE -->
                <div class="space-y-4">
                    <h3 class="text-xl font-black">Performance</h3>
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2.5rem] border dark:border-slate-800 h-80 overflow-y-auto no-scrollbar">
                        <template x-for="sub in subjects">
                            <div class="mb-6 last:mb-0">
                                <div class="flex justify-between items-end mb-2">
                                    <span class="font-black text-sm uppercase tracking-tight" x-text="sub.name"></span>
                                    <span class="text-[10px] font-bold text-primary" x-text="getSubjectProgress(sub) + '% Complete'"></span>
                                </div>
                                <div class="bg-slate-100 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden">
                                    <div class="bg-primary h-full transition-all duration-700" :style="'width: ' + getSubjectProgress(sub) + '%'"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- SMART REVISION ALERTS -->
                <div class="space-y-4">
                    <h3 class="text-xl font-black">Revision Alerts</h3>
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2.5rem] border dark:border-slate-800 h-80 overflow-y-auto no-scrollbar relative">
                        <template x-for="alert in getRevisionAlerts()">
                            <div class="flex items-center gap-4 p-4 rounded-2xl mb-3 border dark:border-slate-800 transition-all duration-500"
                                 :class="alert.isUrgent ? 'alert-urgent shadow-lg' : 'bg-slate-50 dark:bg-slate-900/50'"
                                 x-show="!alert.hidden">
                                <div class="flex-1">
                                    <p class="text-xs font-black uppercase" x-text="alert.chapter"></p>
                                    <p class="text-[10px] font-bold text-primary uppercase" x-text="alert.subject"></p>
                                </div>
                                
                                <template x-if="alert.confirming">
                                    <button @click="undoRevision(alert)" class="text-[10px] font-black bg-slate-800 text-white px-3 py-2 rounded-lg uppercase">Undo (30s)</button>
                                </template>
                                
                                <template x-if="!alert.confirming">
                                    <button @click="markAsRevised(alert)" class="w-10 h-10 rounded-full bg-secondary text-white flex items-center justify-center shadow-md">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- LIBRARY -->
        <div x-show="view === 'library'" x-transition x-cloak class="space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-black">Library</h2>
                <button @click="showAddSubject = true" class="bg-primary text-white px-6 py-2 rounded-xl font-bold">+ New Subject</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="(sub, sIdx) in subjects" :key="sub.id">
                    <div @click="openSubject(sub)" class="bg-white dark:bg-darkcard p-6 rounded-[2.5rem] border dark:border-slate-800 hover:shadow-2xl transition-all cursor-pointer relative overflow-hidden group">
                        <div class="absolute top-0 left-0 w-1.5 h-full bg-primary group-hover:w-3 transition-all"></div>
                        <button @click.stop="deleteSubject(sIdx)" class="absolute top-6 right-6 text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash-alt text-sm"></i></button>
                        <h3 class="text-xl font-black mb-2 pr-8" x-text="sub.name"></h3>
                        <div class="flex items-center justify-between">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest" x-text="sub.chapters?.length + ' Chapters'"></span>
                            <span class="text-[10px] font-black text-primary px-2 py-1 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg" x-text="getSubjectProgress(sub) + '% Done'"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- SUBJECT DETAIL -->
        <div x-show="view === 'subjectDetail'" x-transition x-cloak class="h-[calc(100vh-160px)] -mx-4 md:-mx-8 border-y dark:border-slate-800 bg-white dark:bg-darkcard flex overflow-hidden">
            <div class="w-full md:w-80 border-r dark:border-slate-800 flex flex-col" :class="activeChapter ? 'mobile-hide' : 'flex'">
                <div class="p-4 flex justify-between items-center border-b dark:border-slate-800">
                    <button @click="view = 'library'; forceSync(true);" class="text-slate-400 p-2"><i class="fas fa-chevron-left"></i></button>
                    <span class="text-[10px] font-black uppercase" x-text="activeSubject?.name"></span>
                    <button @click="addChapter()" class="text-primary font-bold text-xl p-2">+</button>
                </div>
                <div class="flex-1 overflow-y-auto no-scrollbar">
                    <template x-for="chapter in activeSubject?.chapters" :key="chapter.id">
                        <div @click="activeChapter = chapter" :class="activeChapter?.id === chapter.id ? 'bg-indigo-50 dark:bg-indigo-900/20 border-r-4 border-primary' : ''" class="p-4 border-b dark:border-slate-800 cursor-pointer">
                            <h4 class="font-bold text-sm truncate" x-text="chapter.title"></h4>
                            <div class="flex gap-0.5 mt-1">
                                <template x-for="r in 5">
                                    <div :class="chapter.revisions >= r ? 'bg-secondary' : 'bg-slate-200 dark:bg-slate-700'" class="h-1 flex-1 rounded-full"></div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="activeChapter" class="flex-1 overflow-y-auto p-4 md:p-10 bg-slate-50/50 dark:bg-darkbg/30 relative" :class="activeChapter ? 'mobile-panel' : ''">
                <button @click="activeChapter = null; stopAudio(); forceSync(true);" class="md:hidden text-primary font-bold text-sm mb-6 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Back to Chapters</button>
                <div class="max-w-4xl mx-auto space-y-6 pb-20">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <input type="text" x-model="activeChapter.title" @input="forceSync()" class="bg-transparent border-none text-3xl font-black focus:ring-0 p-0 w-full">
                        <div class="flex items-center gap-4">
                            <div class="flex items-center bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full">
                                <input type="number" x-model="activeChapter.hours" @input="forceSync()" class="w-10 bg-transparent border-none text-sm font-black p-0 focus:ring-0">
                                <span class="text-[10px] font-black uppercase opacity-40 ml-1">Hrs</span>
                            </div>
                            <button @click="activeChapter.done = !activeChapter.done; forceSync(true);" :class="activeChapter.done ? 'bg-secondary text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'" class="px-6 py-2 rounded-xl text-xs font-black uppercase">Done</button>
                            <button @click="removeChapter()" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                        <h4 class="font-bold mb-4">Notes</h4>
                        <textarea x-model="activeChapter.notes" @input="forceSync()" class="w-full h-40 bg-transparent border-none text-sm focus:ring-0 resize-none leading-relaxed" placeholder="Type chapter details..."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- SETTINGS -->
        <div x-show="view === 'settings'" x-transition x-cloak class="max-w-2xl mx-auto space-y-8 pb-20">
            <h2 class="text-3xl font-black">Settings</h2>
            <div class="bg-white dark:bg-darkcard p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-sm space-y-6">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="fas fa-cloud text-primary"></i> Sync</h3>
                <div class="p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl flex items-center justify-between">
                    <div>
                        <p class="font-bold text-sm">JKM Cloud Backup</p>
                        <p class="text-xs text-slate-500" x-text="useCloud ? 'Account Synced' : 'Offline'"></p>
                    </div>
                    <button @click="useCloud ? logout() : startWithBackup(true)" 
                            :class="useCloud ? 'bg-red-50 text-red-500' : 'bg-primary text-white'"
                            class="px-5 py-2 rounded-xl text-xs font-bold">
                        <span x-text="useCloud ? 'Disconnect' : 'Enable Sync'"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- FOCUS -->
        <div x-show="view === 'focus'" x-transition x-cloak class="max-w-xl mx-auto py-20 text-center">
            <div class="bg-white dark:bg-darkcard p-12 rounded-[4rem] border dark:border-slate-800 shadow-2xl">
                <div class="text-8xl font-black text-primary mb-12 tabular-nums" x-text="formatTime(timerSeconds)"></div>
                <div class="flex justify-center gap-6">
                    <button @click="toggleTimer()" :class="timerActive ? 'bg-red-500' : 'bg-primary'" class="w-20 h-20 rounded-full text-white text-2xl shadow-xl transition-all">
                        <i class="fas" :class="timerActive ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <button @click="resetTimer()" class="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 text-2xl"><i class="fas fa-redo"></i></button>
                </div>
                <template x-if="timerActive">
                    <p class="mt-8 text-[10px] font-black text-primary uppercase tracking-widest animate-pulse">Study Music Playing...</p>
                </template>
            </div>
        </div>
    </main>

    <!-- HIDDEN LOFI AUDIO -->
    <audio id="studyRadio" loop>
        <source src="https://stream.zeno.fm/f3v5u8p7u0huv" type="audio/mpeg">
    </audio>

    <script>
        const CLIENT_ID = '994815938069-amhjk8t195flo04e73unb6d1bgrtpbep.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        function studyOS() {
            return {
                view: 'dash', appStarted: false, loading: false, syncing: false, needsSync: false,
                syncTimer: null, lastSyncTime: 'Never', useCloud: false, darkMode: false,
                subjects: [], activeSubject: null, activeChapter: null, showAddSubject: false,
                newSub: { name: '' }, streak: 0, timerSeconds: 1500, timerActive: false,
                timerInterval: null, examDate: '', wakeLock: null,
                googleToken: null, driveFolderId: null, driveFileId: null,
                isRecording: false, mediaRecorder: null, audioChunks: [],
                audioInstance: null, audioPlaying: false, currentAudioIdx: null, audioDuration: 0, audioCurrentTime: 0, audioTicker: null,

                init() {
                    const saved = localStorage.getItem('titan_os_ultimate_final');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.subjects = data.subjects || [];
                        this.examDate = data.examDate || '';
                    }
                    this.checkStreak();
                    this.darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    const cloudPref = localStorage.getItem('use_cloud_sync');
                    if (cloudPref === 'true') this.startWithBackup(false);
                },

                // EXAM LOGIC
                getDaysToExam() {
                    if (!this.examDate) return 0;
                    const diff = new Date(this.examDate) - new Date();
                    return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
                },
                getRemainingChapters() {
                    return this.subjects.reduce((sum, s) => sum + (s.chapters?.filter(c => !c.done).length || 0), 0);
                },
                getDailyGoalHours() {
                    const days = this.getDaysToExam();
                    if (days <= 0) return 0;
                    const remHours = this.subjects.reduce((sum, s) => sum + (s.chapters?.filter(c => !c.done).reduce((h, c) => h + parseFloat(c.hours || 0), 0) || 0), 0);
                    return (remHours / days).toFixed(1);
                },

                // REVISION SYSTEM
                getRevisionAlerts() {
                    const alerts = [];
                    const now = new Date();
                    this.subjects.forEach(s => s.chapters?.forEach(c => {
                        const lastRev = new Date(c.lastRevised || 0);
                        const diffDays = (now - lastRev) / (1000 * 60 * 60 * 24);
                        if (diffDays > 3 && !c.done) {
                            alerts.push({
                                subject: s.name,
                                chapter: c.title,
                                chapterId: c.id,
                                isUrgent: diffDays > 4, // Becomes Urgent (Red) after 4 days
                                confirming: false,
                                hidden: false
                            });
                        }
                    }));
                    return alerts.slice(0, 10);
                },
                markAsRevised(alert) {
                    alert.confirming = true;
                    alert.timer = setTimeout(() => {
                        this.subjects.forEach(s => {
                            const ch = s.chapters.find(c => c.id === alert.chapterId);
                            if (ch) {
                                ch.revisions = Math.min(5, (ch.revisions || 0) + 1);
                                ch.lastRevised = new Date().toISOString();
                                alert.hidden = true;
                                this.forceSync(true);
                            }
                        });
                    }, 30000); // 30 second delay
                },
                undoRevision(alert) {
                    clearTimeout(alert.timer);
                    alert.confirming = false;
                },

                // FOCUS SYSTEM
                async toggleTimer() {
                    const radio = document.getElementById('studyRadio');
                    if (this.timerActive) {
                        clearInterval(this.timerInterval);
                        this.timerActive = false;
                        radio.pause();
                        if (this.wakeLock) { this.wakeLock.release(); this.wakeLock = null; }
                    } else {
                        this.timerActive = true;
                        radio.play().catch(() => console.log("Music interaction required"));
                        if ('wakeLock' in navigator) {
                            try { this.wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
                        }
                        this.timerInterval = setInterval(() => {
                            if (this.timerSeconds > 0) this.timerSeconds--;
                            else this.toggleTimer();
                        }, 1000);
                    }
                },

                forceSync(immediate = false) {
                    const pkg = { subjects: this.subjects, examDate: this.examDate };
                    localStorage.setItem('titan_os_ultimate_final', JSON.stringify(pkg));
                    if (!this.useCloud) return;
                    if (this.syncTimer) clearTimeout(this.syncTimer);
                    if (immediate) this.syncToCloud();
                    else this.syncTimer = setTimeout(() => this.syncToCloud(), 2000);
                },

                // UTILITIES
                getGlobalProgress() {
                    const total = this.subjects.reduce((a, b) => a + (b.chapters?.length || 0), 0);
                    if (total === 0) return 0;
                    return Math.round((this.subjects.reduce((a, b) => a + (b.chapters?.filter(c => c.done).length || 0), 0) / total) * 100);
                },
                getGlobalRevisionProgress() {
                    let chapters = 0, points = 0;
                    this.subjects.forEach(s => s.chapters?.forEach(c => { chapters++; points += (c.revisions || 0); }));
                    return chapters ? Math.round((points / (chapters * 5)) * 100) : 0;
                },
                getSubjectProgress(sub) {
                    if (!sub.chapters?.length) return 0;
                    return Math.round((sub.chapters.filter(c => c.done).length / sub.chapters.length) * 100);
                },
                getTotalHours() { return this.subjects.reduce((sum, s) => sum + (s.chapters?.reduce((h, c) => h + parseFloat(c.hours || 0), 0) || 0), 0).toFixed(1); },
                getCompletedHours() { return this.subjects.reduce((sum, s) => sum + (s.chapters?.filter(c => c.done).reduce((h, c) => h + parseFloat(c.hours || 0), 0) || 0), 0).toFixed(1); },
                checkStreak() {
                    const last = localStorage.getItem('last_active');
                    const today = new Date().toDateString();
                    if (last === today) this.streak = parseInt(localStorage.getItem('streak_count') || 1);
                    else {
                        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                        if (last === yesterday.toDateString()) this.streak = parseInt(localStorage.getItem('streak_count') || 0) + 1;
                        else this.streak = 1;
                    }
                    localStorage.setItem('streak_count', this.streak);
                    localStorage.setItem('last_active', today);
                },

                // CLOUD LOGIC
                async startWithBackup(interactive = true) {
                    this.loading = true;
                    const client = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID, scope: SCOPES,
                        callback: async (res) => {
                            if (res.error) { this.loading = false; return; }
                            this.googleToken = res.access_token;
                            await this.initializeCloudSync();
                            this.useCloud = true; this.appStarted = true; this.loading = false;
                            localStorage.setItem('use_cloud_sync', 'true');
                        },
                    });
                    interactive ? client.requestAccessToken() : client.requestAccessToken({ prompt: 'none' });
                },
                startWithoutBackup() { this.appStarted = true; localStorage.setItem('use_cloud_sync', 'false'); },
                async initializeCloudSync() {
                    await new Promise(r => gapi.load('client', r));
                    const headers = { Authorization: `Bearer ${this.googleToken}` };
                    const fQuery = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("name='JKM Study' and mimeType='application/vnd.google-apps.folder' and trashed=false")}`, { headers });
                    const fData = await fQuery.json();
                    if (fData.files?.length > 0) this.driveFolderId = fData.files[0].id;
                    else {
                        const res = await fetch('https://www.googleapis.com/drive/v3/files', { method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' }, body: JSON.stringify({ name: 'JKM Study', mimeType: 'application/vnd.google-apps.folder' }) });
                        this.driveFolderId = (await res.json()).id;
                    }
                    const bQuery = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${this.driveFolderId}' in parents and name='backup.json' and trashed=false`)}`, { headers });
                    const bData = await bQuery.json();
                    if (bData.files?.length > 0) {
                        this.driveFileId = bData.files[0].id;
                        const cloudRes = await fetch(`https://www.googleapis.com/drive/v3/files/${this.driveFileId}?alt=media`, { headers });
                        const cloudData = await cloudRes.json();
                        if (cloudData) {
                            this.subjects = cloudData.subjects || [];
                            this.examDate = cloudData.examDate || '';
                            localStorage.setItem('titan_os_ultimate_final', JSON.stringify(cloudData));
                        }
                    }
                },
                async syncToCloud() {
                    if (!this.googleToken || !this.driveFolderId || this.syncing) return;
                    this.syncing = true;
                    try {
                        const boundary = 'jkm_cloud_sync';
                        const pkg = { subjects: this.subjects, examDate: this.examDate };
                        const metadata = { name: 'backup.json', mimeType: 'application/json' };
                        if (!this.driveFileId) metadata.parents = [this.driveFolderId];
                        const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(pkg)}\r\n--${boundary}--`;
                        const url = this.driveFileId ? `https://www.googleapis.com/upload/drive/v3/files/${this.driveFileId}?uploadType=multipart` : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
                        const res = await fetch(url, { method: this.driveFileId ? 'PATCH' : 'POST', headers: { Authorization: `Bearer ${this.googleToken}`, 'Content-Type': `multipart/related; boundary=${boundary}` }, body });
                        const data = await res.json();
                        if (data.id) { this.driveFileId = data.id; this.lastSyncTime = new Date().toLocaleTimeString(); }
                    } finally { this.syncing = false; }
                },

                // BASIC SUBJECT ACTIONS
                createSubject() {
                    if (!this.newSub.name) return;
                    this.subjects.push({ id: Date.now(), name: this.newSub.name, chapters: [] });
                    this.newSub.name = ''; this.showAddSubject = false;
                    this.forceSync(true);
                },
                deleteSubject(idx) { if(confirm('Delete?')) { this.subjects.splice(idx, 1); this.forceSync(true); } },
                openSubject(sub) { this.activeSubject = sub; this.view = 'subjectDetail'; this.activeChapter = null; },
                addChapter() {
                    if(!this.activeSubject.chapters) this.activeSubject.chapters = [];
                    const ch = { id: Date.now(), title: 'New Chapter', hours: 0, done: false, revisions: 0, notes: '', lastRevised: new Date().toISOString() };
                    this.activeSubject.chapters.push(ch); this.activeChapter = ch;
                    this.forceSync(true);
                },
                removeChapter() {
                    if(confirm('Delete?')) {
                        this.activeSubject.chapters = this.activeSubject.chapters.filter(c => c.id !== this.activeChapter.id);
                        this.activeChapter = null; this.forceSync(true);
                    }
                },
                formatTime(sec) { return `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`; },
                resetTimer() { this.timerSeconds = 1500; this.timerActive = false; clearInterval(this.timerInterval); document.getElementById('studyRadio').pause(); }
            }
        }
    </script>
</body>
