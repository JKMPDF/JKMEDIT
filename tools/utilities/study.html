<!DOCTYPE html>
<html lang="en" x-data="studyOS()" x-init="init()" :class="darkMode ? 'dark' : ''">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#6366f1', secondary: '#10b981', accent: '#f59e0b', darkbg: '#0f172a', darkcard: '#1e293b' }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        html, body { 
            overscroll-behavior-y: contain; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media (max-width: 768px) { 
            .mobile-hide { display: none !important; } 
            .mobile-panel { position: fixed; inset: 0; z-index: 150; background: white; overflow-y: auto; }
            .dark .mobile-panel { background: #0f172a; }
        }
        input[type="range"] { accent-color: #6366f1; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkbg text-slate-900 dark:text-slate-100 min-h-screen pb-20 md:pb-0 md:pl-20">

    <!-- SYNCING OVERLAY -->
    <div x-show="loading" class="fixed inset-0 z-[2000] bg-white dark:bg-darkbg flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black uppercase tracking-widest opacity-50">JKM Cloud Syncing Data...</p>
    </div>

    <!-- STARTUP SCREEN -->
    <div x-show="!appStarted && !loading" class="fixed inset-0 z-[1000] bg-white dark:bg-darkbg flex items-center justify-center p-6 text-center">
        <div class="max-w-md w-full space-y-8">
            <h1 class="text-8xl font-black text-primary tracking-tighter">JKM</h1>
            <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">The Study Architect</p>
            <div class="flex flex-col gap-4">
                <button @click="startWithBackup(true)" class="p-6 bg-primary text-white rounded-3xl font-black shadow-xl hover:scale-105 transition">
                    <i class="fab fa-google mr-2"></i> Cloud Sync (Google Drive)
                </button>
                <button @click="startWithoutBackup()" class="p-6 bg-slate-100 dark:bg-darkcard rounded-3xl font-bold hover:bg-slate-200 transition text-slate-600">
                    Local Mode Only
                </button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside x-show="appStarted" class="fixed left-0 top-0 h-screen w-20 bg-slate-900 hidden md:flex flex-col items-center py-8 z-50">
        <div class="mb-10 text-primary font-black text-xl">JKM</div>
        <div class="flex flex-col gap-8 flex-1">
            <button @click="view = 'dash'" :class="view === 'dash' ? 'text-white' : 'text-slate-500'"><i class="fas fa-home text-xl"></i></button>
            <button @click="view = 'library'" :class="view === 'library' ? 'text-white' : 'text-slate-500'"><i class="fas fa-book text-xl"></i></button>
            <button @click="view = 'focus'" :class="view === 'focus' ? 'text-white' : 'text-slate-500'"><i class="fas fa-stopwatch text-xl"></i></button>
            <button @click="view = 'settings'" :class="view === 'settings' ? 'text-white' : 'text-slate-500'"><i class="fas fa-cog text-xl"></i></button>
        </div>
        <button @click="darkMode = !darkMode" class="text-slate-400 mb-4"><i :class="darkMode ? 'fa-sun' : 'fa-moon'" class="fas"></i></button>
    </aside>

    <!-- MOBILE NAV -->
    <nav x-show="appStarted" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-darkcard border-t dark:border-slate-800 flex md:hidden justify-around items-center py-3 z-[100] shadow-2xl">
        <button @click="view = 'dash'" :class="view === 'dash' ? 'text-primary' : 'text-slate-400'"><i class="fas fa-home text-xl"></i></button>
        <button @click="view = 'library'" :class="view === 'library' ? 'text-primary' : 'text-slate-400'"><i class="fas fa-book text-xl"></i></button>
        <button @click="showAddSubject = true" class="bg-primary text-white w-12 h-12 rounded-full -mt-10 shadow-lg flex items-center justify-center border-4 border-slate-50 dark:border-darkbg"><i class="fas fa-plus"></i></button>
        <button @click="view = 'settings'" :class="view === 'settings' ? 'text-primary' : 'text-slate-400'"><i class="fas fa-cog text-xl"></i></button>
        <button @click="darkMode = !darkMode"><i :class="darkMode ? 'fa-sun' : 'fa-moon'" class="fas text-xl"></i></button>
    </nav>

    <main x-show="appStarted" class="p-4 md:p-8 max-w-7xl mx-auto">
        
        <!-- DASHBOARD -->
        <div x-show="view === 'dash'" x-transition x-cloak class="space-y-6">
            
            <div x-show="syncing" class="fixed top-0 left-0 right-0 h-1 bg-primary/20 z-[2000]">
                <div class="h-full bg-primary animate-[shimmer_2s_infinite]" style="width: 100%"></div>
            </div>

            <header class="flex justify-between items-center">
                <h1 class="text-3xl font-black">Dashboard</h1>
                <div x-show="useCloud" class="flex flex-col items-end">
                    <div class="flex items-center gap-2">
                        <button @click="forceSync(true)" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition active:scale-90" title="Sync Now">
                            <i class="fas fa-sync-alt text-xs transition-colors" :class="syncing ? 'animate-spin text-amber-500' : 'text-emerald-500'"></i>
                        </button>
                        <div class="flex items-center gap-2 px-3 py-1 rounded-full text-[10px] font-black uppercase"
                             :class="syncing ? 'bg-amber-50 text-amber-500' : 'bg-emerald-50 text-emerald-500'">
                            <span class="w-2 h-2 rounded-full" :class="syncing ? 'bg-amber-500 animate-ping' : 'bg-emerald-500'"></span> 
                            <span x-text="syncing ? 'Syncing...' : 'Cloud Synced'"></span>
                        </div>
                    </div>
                    <span class="text-[8px] font-bold opacity-40 uppercase mr-1 mt-1" x-text="'Last: ' + lastSyncTime"></span>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Completion</p>
                    <h2 class="text-3xl font-black text-primary" x-text="getGlobalProgress() + '%'"></h2>
                </div>
                <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Mastery Level</p>
                    <h2 class="text-3xl font-black text-secondary" x-text="getGlobalRevisionProgress() + '%'"></h2>
                </div>
                <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Study Streak</p>
                    <h2 class="text-3xl font-black" x-text="streak + ' Days 🔥'"></h2>
                </div>
                <div class="bg-primary p-6 rounded-[2rem] text-white shadow-xl">
                    <p class="text-[10px] font-black opacity-70 uppercase tracking-widest mb-1">Hours Invested</p>
                    <h2 class="text-3xl font-black" x-text="getCompletedHours() + ' / ' + getTotalHours() + 'h'"></h2>
                </div>
            </div>

            <!-- ANALYTICS -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-10">
                <div class="space-y-4">
                    <h3 class="text-xl font-black">Subject Analytics</h3>
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2.5rem] border dark:border-slate-800 h-64 overflow-y-auto no-scrollbar">
                        <template x-for="sub in subjects">
                            <div class="flex items-center justify-between mb-4 pb-4 border-b dark:border-slate-800 last:border-0">
                                <span class="font-bold text-sm" x-text="sub.name"></span>
                                <div class="flex gap-1">
                                    <template x-for="i in 5">
                                        <div class="w-4 h-1.5 rounded-full" :class="i <= (getSubjectProgress(sub)/20) ? 'bg-primary' : 'bg-slate-100 dark:bg-slate-800'"></div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <div class="space-y-4">
                    <h3 class="text-xl font-black">Revision Alerts</h3>
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2.5rem] border dark:border-slate-800 h-64 overflow-y-auto no-scrollbar">
                        <template x-for="alert in getRevisionAlerts()">
                            <div class="flex items-center gap-3 p-3 bg-amber-50 dark:bg-amber-900/20 rounded-2xl mb-2">
                                <i class="fas fa-history text-amber-600"></i>
                                <div class="flex-1">
                                    <p class="text-xs font-black" x-text="alert.chapter"></p>
                                    <p class="text-[9px] font-bold text-slate-500" x-text="alert.subject"></p>
                                </div>
                                <span class="text-[9px] font-black text-amber-700 uppercase">Review</span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- LIBRARY -->
        <div x-show="view === 'library'" x-transition x-cloak class="space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-black">Library</h2>
                <button @click="showAddSubject = true" class="bg-primary text-white px-6 py-2 rounded-xl font-bold">+ New Subject</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="(sub, sIdx) in subjects" :key="sub.id">
                    <div @click="openSubject(sub)" class="bg-white dark:bg-darkcard p-6 rounded-[2.5rem] border dark:border-slate-800 hover:shadow-2xl transition-all cursor-pointer relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
                        <button @click.stop="deleteSubject(sIdx)" class="absolute top-6 right-6 text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash-alt text-sm"></i></button>
                        <h3 class="text-xl font-black mb-1" x-text="sub.name"></h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" x-text="sub.chapters?.length + ' Chapters'"></p>
                    </div>
                </template>
            </div>
        </div>

        <!-- SUBJECT DETAIL -->
        <div x-show="view === 'subjectDetail'" x-transition x-cloak class="h-[calc(100vh-160px)] -mx-4 md:-mx-8 border-y dark:border-slate-800 bg-white dark:bg-darkcard flex overflow-hidden">
            <div class="w-full md:w-80 border-r dark:border-slate-800 flex flex-col" :class="activeChapter ? 'mobile-hide' : 'flex'">
                <div class="p-4 flex justify-between items-center border-b dark:border-slate-800">
                    <button @click="view = 'library'; forceSync(true);" class="text-slate-400 p-2"><i class="fas fa-chevron-left"></i></button>
                    <span class="text-[10px] font-black uppercase" x-text="activeSubject?.name"></span>
                    <button @click="addChapter()" class="text-primary font-bold text-xl p-2">+</button>
                </div>
                <div class="flex-1 overflow-y-auto no-scrollbar">
                    <template x-for="chapter in activeSubject?.chapters" :key="chapter.id">
                        <div @click="activeChapter = chapter" :class="activeChapter?.id === chapter.id ? 'bg-indigo-50 dark:bg-indigo-900/20 border-r-4 border-primary' : ''" class="p-4 border-b dark:border-slate-800 cursor-pointer">
                            <h4 class="font-bold text-sm truncate" x-text="chapter.title"></h4>
                            <div class="flex gap-0.5 mt-1">
                                <template x-for="r in 5">
                                    <div :class="chapter.revisions >= r ? 'bg-secondary' : 'bg-slate-200 dark:bg-slate-700'" class="h-1 flex-1 rounded-full"></div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="activeChapter" class="flex-1 overflow-y-auto p-4 md:p-10 bg-slate-50/50 dark:bg-darkbg/30 relative" :class="activeChapter ? 'mobile-panel' : ''">
                <button @click="activeChapter = null; stopAudio(); forceSync(true);" class="md:hidden text-primary font-bold text-sm mb-6 flex items-center gap-2"><i class="fas fa-arrow-left"></i> Back to Chapters</button>
                <div class="max-w-4xl mx-auto space-y-6 pb-20">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <input type="text" x-model="activeChapter.title" @input="forceSync()" class="bg-transparent border-none text-3xl font-black focus:ring-0 p-0 w-full">
                        <div class="flex items-center gap-4">
                            <div class="flex items-center bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full">
                                <input type="number" x-model="activeChapter.hours" @input="forceSync()" class="w-10 bg-transparent border-none text-sm font-black p-0 focus:ring-0">
                                <span class="text-[10px] font-black uppercase opacity-40 ml-1">Hrs</span>
                            </div>
                            <button @click="activeChapter.done = !activeChapter.done; forceSync(true);" :class="activeChapter.done ? 'bg-secondary text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'" class="px-6 py-2 rounded-xl text-xs font-black uppercase">Done</button>
                            <button @click="removeChapter()" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Mastery Dots</p>
                        <div class="flex gap-2">
                            <template x-for="r in 5">
                                <button @click="toggleRevision(activeChapter, r); forceSync(true);" 
                                        :class="activeChapter.revisions >= r ? 'bg-secondary' : 'bg-slate-100 dark:bg-slate-800'" 
                                        class="h-4 flex-1 rounded-full transition-all border dark:border-slate-700"></button>
                            </template>
                        </div>
                    </div>

                    <!-- AUDIO SECTION -->
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800 space-y-6">
                        <div class="flex items-center justify-between">
                            <h4 class="text-xs font-black uppercase tracking-widest text-slate-400">Recordings</h4>
                            <button @click="isRecording ? stopRecording() : startRecording()" 
                                    :class="isRecording ? 'bg-red-500 animate-pulse' : 'bg-primary'" 
                                    class="w-12 h-12 rounded-full text-white shadow-lg transition-all">
                                <i class="fas" :class="isRecording ? 'fa-stop text-sm' : 'fa-microphone'"></i>
                            </button>
                        </div>
                        <div class="space-y-3">
                            <template x-for="(rec, idx) in activeChapter.recordings || []" :key="idx">
                                <div class="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl border dark:border-slate-800">
                                    <div class="flex items-center justify-between mb-2">
                                        <span class="text-[10px] font-black uppercase text-slate-400" x-text="'Clip ' + (idx + 1)"></span>
                                        <button @click="deleteRecording(idx)" class="text-red-400"><i class="fas fa-trash-alt text-xs"></i></button>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <button @click="toggleAudio(rec, idx)" class="text-primary text-2xl">
                                            <i class="fas" :class="(audioPlaying && currentAudioIdx === idx) ? 'fa-pause-circle' : 'fa-play-circle'"></i>
                                        </button>
                                        <div class="flex-1">
                                            <input type="range" class="w-full h-1 bg-slate-200 dark:bg-slate-800 rounded-full appearance-none"
                                                   min="0" :max="audioDuration" step="0.1" 
                                                   :value="currentAudioIdx === idx ? audioCurrentTime : 0"
                                                   @input="currentAudioIdx === idx && seekAudio($event.target.value)">
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800">
                        <h4 class="font-bold mb-4">Notes</h4>
                        <textarea x-model="activeChapter.notes" @input="forceSync()" class="w-full h-40 bg-transparent border-none text-sm focus:ring-0 resize-none leading-relaxed" placeholder="Type chapter details..."></textarea>
                    </div>

                    <!-- ACTIVE RECALL -->
                    <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] border dark:border-slate-800 space-y-4">
                        <h4 class="font-bold">Active Recall</h4>
                        <div class="space-y-4">
                            <template x-for="(q, qIdx) in activeChapter.questions || []" :key="qIdx">
                                <div class="space-y-2 border-b dark:border-slate-800 pb-4">
                                    <div class="flex gap-2 items-center">
                                        <input type="checkbox" x-model="q.done" @change="forceSync(true)" class="rounded-full text-secondary">
                                        <input type="text" x-model="q.text" @input="forceSync()" placeholder="Question text..." class="flex-1 bg-transparent border-none text-sm font-bold focus:ring-0">
                                        <button @click="activeChapter.questions.splice(qIdx, 1); forceSync(true);" class="text-red-300"><i class="fas fa-times"></i></button>
                                    </div>
                                    <div class="flex items-center gap-2 pl-6 bg-slate-50 dark:bg-slate-900 rounded-xl p-2">
                                        <i class="fas fa-link text-[10px] opacity-30"></i>
                                        <input type="text" x-model="q.url" @input="forceSync()" placeholder="Reference URL (optional)..." class="flex-1 bg-transparent border-none text-[10px] focus:ring-0 italic">
                                        <template x-if="q.url">
                                            <a :href="q.url" target="_blank" class="text-primary text-[10px] font-black uppercase mr-2 underline">Visit</a>
                                        </template>
                                    </div>
                                </div>
                            </template>
                            <button @click="activeChapter.questions.push({text:'', done:false, url:''}); forceSync(true);" class="text-primary text-[10px] font-black uppercase">+ Add Question & Link</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SETTINGS -->
        <div x-show="view === 'settings'" x-transition x-cloak class="max-w-2xl mx-auto space-y-8 pb-20">
            <h2 class="text-3xl font-black">Settings</h2>
            
            <div class="bg-white dark:bg-darkcard p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-sm space-y-6">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="fas fa-cloud text-primary"></i> Sync</h3>
                <div class="p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl flex items-center justify-between">
                    <div>
                        <p class="font-bold text-sm">JKM Cloud Backup</p>
                        <p class="text-xs text-slate-500" x-text="useCloud ? 'Account Synced' : 'Offline'"></p>
                    </div>
                    <button @click="useCloud ? logout() : startWithBackup(true)" 
                            :class="useCloud ? 'bg-red-50 text-red-500' : 'bg-primary text-white'"
                            class="px-5 py-2 rounded-xl text-xs font-bold">
                        <span x-text="useCloud ? 'Disconnect' : 'Enable Sync'"></span>
                    </button>
                </div>
            </div>
            
            <div class="bg-white dark:bg-darkcard p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-sm space-y-6">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="fas fa-file-excel text-green-500"></i> Excel Data</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button @click="downloadTemplate()" class="p-6 bg-slate-50 dark:bg-slate-900 rounded-2xl text-left border dark:border-slate-800">
                        <i class="fas fa-file-download text-primary mb-2 text-xl"></i>
                        <p class="font-bold text-sm">Download Library</p>
                        <p class="text-[10px] opacity-50 italic text-slate-500">Includes current subjects</p>
                    </button>
                    <button @click="triggerImport()" class="p-6 bg-slate-50 dark:bg-slate-900 rounded-2xl text-left border dark:border-slate-800">
                        <i class="fas fa-file-upload text-secondary mb-2 text-xl"></i>
                        <p class="font-bold text-sm">Import Excel</p>
                    </button>
                </div>
                <button @click="deleteAllData()" class="w-full py-4 bg-red-500 text-white rounded-2xl text-xs font-black uppercase transition">Delete Everything (Local & Cloud)</button>
            </div>
        </div>

        <!-- FOCUS -->
        <div x-show="view === 'focus'" x-transition x-cloak class="max-w-xl mx-auto py-20 text-center">
            <div class="bg-white dark:bg-darkcard p-12 rounded-[4rem] border dark:border-slate-800 shadow-2xl">
                <div class="text-8xl font-black text-primary mb-12 tabular-nums" x-text="formatTime(timerSeconds)"></div>
                <div class="flex justify-center gap-6">
                    <button @click="toggleTimer()" :class="timerActive ? 'bg-red-500' : 'bg-primary'" class="w-20 h-20 rounded-full text-white text-2xl shadow-xl transition-all">
                        <i class="fas" :class="timerActive ? 'fa-pause' : 'fa-play'"></i>
                    </button>
                    <button @click="resetTimer()" class="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 text-2xl"><i class="fas fa-redo"></i></button>
                </div>
            </div>
        </div>
    </main>

    <div x-cloak x-show="showAddSubject" class="fixed inset-0 z-[200] flex items-center justify-center p-4 text-center">
        <div @click="showAddSubject = false" class="absolute inset-0 bg-slate-900/60 backdrop-blur-md"></div>
        <div class="relative bg-white dark:bg-darkcard p-8 rounded-[3rem] w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-black mb-8">New Subject</h2>
            <div class="space-y-4">
                <input type="text" x-model="newSub.name" placeholder="Subject Title" class="w-full p-4 bg-slate-50 dark:bg-slate-900 rounded-2xl outline-none font-bold border-none text-center shadow-inner">
                <button @click="createSubject(); forceSync(true);" class="w-full py-5 bg-primary text-white rounded-3xl font-black shadow-xl">Initialize</button>
            </div>
        </div>
    </div>

    <input type="file" id="excelFile" class="hidden" @change="handleImport">

    <script>
        const CLIENT_ID = '994815938069-amhjk8t195flo04e73unb6d1bgrtpbep.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';

        function studyOS() {
            return {
                view: 'dash',
                appStarted: false,
                loading: false,
                syncing: false,
                needsSync: false,
                syncTimer: null,
                lastSyncTime: 'Never',
                useCloud: false,
                darkMode: false,
                subjects: [],
                activeSubject: null,
                activeChapter: null,
                showAddSubject: false,
                newSub: { name: '' },
                streak: 0,
                timerSeconds: 1500,
                timerActive: false,
                timerInterval: null,
                googleToken: null,
                driveFolderId: null,
                driveFileId: null,
                isRecording: false,
                mediaRecorder: null,
                audioChunks: [],
                audioInstance: null,
                audioPlaying: false,
                currentAudioIdx: null,
                audioDuration: 0,
                audioCurrentTime: 0,
                audioTicker: null,

                init() {
                    const saved = localStorage.getItem('titan_os_ultimate_final');
                    if (saved) this.subjects = JSON.parse(saved);
                    this.checkStreak();
                    this.darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    
                    const cloudPref = localStorage.getItem('use_cloud_sync');
                    if (cloudPref === 'true') this.startWithBackup(false);

                    window.onpopstate = (e) => {
                        if (this.activeChapter) { this.activeChapter = null; this.stopAudio(); }
                        else if (this.view !== 'dash') { this.view = 'dash'; }
                    };
                    history.pushState({view: 'dash'}, "");
                },

                forceSync(immediate = false) {
                    localStorage.setItem('titan_os_ultimate_final', JSON.stringify(this.subjects));
                    if (!this.useCloud) return;

                    if (this.syncTimer) clearTimeout(this.syncTimer);

                    if (immediate) {
                        this.syncToCloud();
                    } else {
                        // Debounce: Prevents sync spamming while typing
                        this.syncTimer = setTimeout(() => {
                            this.syncToCloud();
                        }, 2000);
                    }
                },

                checkStreak() {
                    const last = localStorage.getItem('last_active');
                    const today = new Date().toDateString();
                    if (last === today) this.streak = parseInt(localStorage.getItem('streak_count') || 1);
                    else {
                        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                        if (last === yesterday.toDateString()) this.streak = parseInt(localStorage.getItem('streak_count') || 0) + 1;
                        else this.streak = 1;
                    }
                    localStorage.setItem('streak_count', this.streak);
                    localStorage.setItem('last_active', today);
                },

                downloadTemplate() {
                    const rows = [];
                    this.subjects.forEach(s => {
                        s.chapters?.forEach(c => {
                            rows.push({ Subject: s.name, Chapter: c.title, Hours: c.hours, Notes: c.notes });
                        });
                    });
                    const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{ Subject: '', Chapter: '', Hours: 0, Notes: '' }]);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "JKM_Library");
                    XLSX.writeFile(wb, "JKM_Current_Data.xlsx");
                },
                triggerImport() { document.getElementById('excelFile').click(); },
                handleImport(e) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                        rows.forEach(r => {
                            let sub = this.subjects.find(s => s.name === r.Subject);
                            if (!sub) {
                                sub = { id: Date.now() + Math.random(), name: r.Subject || 'New', chapters: [] };
                                this.subjects.push(sub);
                            }
                            sub.chapters.push({
                                id: Math.random(), title: r.Chapter || 'New', hours: parseFloat(r.Hours || 0), 
                                done: false, revisions: 0, notes: r.Notes || '', recordings: [], questions: [], lastRevised: new Date()
                            });
                        });
                        this.forceSync(true);
                    };
                    reader.readAsBinaryString(e.target.files[0]);
                },

                createSubject() {
                    if (!this.newSub.name) return;
                    this.subjects.push({ id: Date.now(), name: this.newSub.name, chapters: [] });
                    this.newSub.name = ''; this.showAddSubject = false;
                    this.forceSync(true);
                },
                deleteSubject(idx) { if(confirm('Delete subject?')) { this.subjects.splice(idx, 1); this.forceSync(true); } },
                openSubject(sub) { this.activeSubject = sub; this.view = 'subjectDetail'; this.activeChapter = null; history.pushState({view:'subjectDetail'}, ""); },
                addChapter() {
                    if(!this.activeSubject.chapters) this.activeSubject.chapters = [];
                    const ch = { id: Date.now(), title: 'New Chapter', hours: 0, done: false, revisions: 0, notes: '', recordings: [], questions: [], lastRevised: new Date() };
                    this.activeSubject.chapters.push(ch); this.activeChapter = ch;
                    this.forceSync(true);
                },
                removeChapter() {
                    if(confirm('Delete?')) {
                        this.activeSubject.chapters = this.activeSubject.chapters.filter(c => c.id !== this.activeChapter.id);
                        this.activeChapter = null; this.stopAudio(); this.forceSync(true);
                    }
                },
                toggleRevision(ch, level) {
                    ch.revisions = (ch.revisions === level) ? level - 1 : level;
                    ch.lastRevised = new Date();
                    this.forceSync(true);
                },

                getTotalHours() {
                    return this.subjects.reduce((sum, sub) => sum + sub.chapters.reduce((s, c) => s + parseFloat(c.hours || 0), 0), 0).toFixed(1);
                },
                getCompletedHours() {
                    return this.subjects.reduce((sum, sub) => sum + sub.chapters.filter(c => c.done).reduce((s, c) => s + parseFloat(c.hours || 0), 0), 0).toFixed(1);
                },
                getGlobalProgress() {
                    const total = this.subjects.reduce((a, b) => a + (b.chapters?.length || 0), 0);
                    return total ? Math.round((this.subjects.reduce((a, b) => a + b.chapters.filter(c => c.done).length, 0) / total) * 100) : 0;
                },
                getGlobalRevisionProgress() {
                    let chapters = 0, points = 0;
                    this.subjects.forEach(s => s.chapters?.forEach(c => { chapters++; points += (c.revisions || 0); }));
                    return chapters ? Math.round((points / (chapters * 5)) * 100) : 0;
                },
                getSubjectProgress(sub) {
                    return sub.chapters?.length ? Math.round((sub.chapters.filter(c => c.done).length / sub.chapters.length) * 100) : 0;
                },
                getRevisionAlerts() {
                    const alerts = [];
                    this.subjects.forEach(s => s.chapters?.forEach(c => {
                        const diff = (new Date() - new Date(c.lastRevised)) / (1000*60*60*24);
                        if (diff > 3 && !c.done) alerts.push({ subject: s.name, chapter: c.title });
                    }));
                    return alerts.slice(0, 5);
                },

                async startWithBackup(interactive = true) {
                    this.loading = true;
                    const safety = setTimeout(() => { if (!this.appStarted) this.loading = false; }, 10000);
                    const client = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID, scope: SCOPES,
                        callback: async (res) => {
                            clearTimeout(safety);
                            if (res.error) { this.loading = false; return; }
                            this.googleToken = res.access_token;
                            await this.initializeCloudSync();
                            this.useCloud = true; this.appStarted = true; this.loading = false;
                            localStorage.setItem('use_cloud_sync', 'true');
                        },
                    });
                    interactive ? client.requestAccessToken() : client.requestAccessToken({ prompt: 'none' });
                },
                startWithoutBackup() { this.appStarted = true; localStorage.setItem('use_cloud_sync', 'false'); },
                logout() { localStorage.setItem('use_cloud_sync', 'false'); location.reload(); },
                
                async initializeCloudSync() {
                    await new Promise(r => gapi.load('client', r));
                    const headers = { Authorization: `Bearer ${this.googleToken}` };
                    
                    // 1. Find or Create Folder "JKM Study"
                    const fQuery = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("name='JKM Study' and mimeType='application/vnd.google-apps.folder' and trashed=false")}`, { headers });
                    const fData = await fQuery.json();
                    
                    if (fData.files?.length > 0) {
                        this.driveFolderId = fData.files[0].id;
                    } else {
                        const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                            method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: 'JKM Study', mimeType: 'application/vnd.google-apps.folder' })
                        });
                        const data = await createRes.json();
                        this.driveFolderId = data.id;
                    }
                    
                    // 2. Find Backup file inside that folder
                    const bQuery = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${this.driveFolderId}' in parents and name='backup.json' and trashed=false`)}`, { headers });
                    const bData = await bQuery.json();
                    
                    if (bData.files?.length > 0) {
                        this.driveFileId = bData.files[0].id;
                        const cloudRes = await fetch(`https://www.googleapis.com/drive/v3/files/${this.driveFileId}?alt=media`, { headers });
                        const cloudData = await cloudRes.json();
                        if (cloudData && Array.isArray(cloudData)) {
                            this.subjects = cloudData;
                            localStorage.setItem('titan_os_ultimate_final', JSON.stringify(this.subjects));
                            this.lastSyncTime = "Cloud Ready";
                        }
                    }
                },

                // ROBUST SYNC SYSTEM (Matches Ledger logic)
                async syncToCloud() {
                    if (!this.googleToken || !this.driveFolderId) return;
                    if (this.syncing) {
                        this.needsSync = true;
                        return;
                    }
                    
                    this.syncing = true;
                    this.needsSync = false;
                    
                    try {
                        const boundary = 'jkm_multipart_boundary_' + Date.now();
                        
                        // Metadata: ONLY include parents when creating (POST), not updating (PATCH)
                        const metadata = { 
                            name: 'backup.json', 
                            mimeType: 'application/json' 
                        };
                        if (!this.driveFileId) {
                            metadata.parents = [this.driveFolderId];
                        }

                        // Construct Multipart Body
                        const blob = new Blob([JSON.stringify(this.subjects)], { type: 'application/json' });
                        const delimiter = `\r\n--${boundary}\r\n`;
                        const closeDelimiter = `\r\n--${boundary}--`;
                        
                        const body = new Blob([
                            delimiter,
                            'Content-Type: application/json; charset=UTF-8\r\n\r\n',
                            JSON.stringify(metadata),
                            delimiter,
                            'Content-Type: application/json\r\n\r\n',
                            blob,
                            closeDelimiter
                        ]);

                        const url = this.driveFileId 
                            ? `https://www.googleapis.com/upload/drive/v3/files/${this.driveFileId}?uploadType=multipart` 
                            : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
                        
                        const res = await fetch(url, { 
                            method: this.driveFileId ? 'PATCH' : 'POST', 
                            headers: { 
                                Authorization: `Bearer ${this.googleToken}`,
                                'Content-Type': `multipart/related; boundary=${boundary}`
                            }, 
                            body: body 
                        });

                        if (!res.ok) {
                            const error = await res.json();
                            throw new Error(error.error.message);
                        }

                        const data = await res.json();
                        if (data.id) {
                            this.driveFileId = data.id;
                            this.lastSyncTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        }
                    } catch(e) {
                        console.error("Sync Error:", e);
                    } finally {
                        this.syncing = false;
                        if (this.needsSync) this.syncToCloud();
                    }
                },

                async deleteAllData() {
                    if (confirm('Erase all local data and JKM Study cloud folder?')) {
                        if (this.useCloud && this.driveFolderId) await fetch(`https://www.googleapis.com/drive/v3/files/${this.driveFolderId}`, { method: 'DELETE', headers: { Authorization: `Bearer ${this.googleToken}` } });
                        localStorage.clear(); location.reload();
                    }
                },

                async startRecording() {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        this.mediaRecorder = new MediaRecorder(stream);
                        this.audioChunks = [];
                        this.mediaRecorder.ondataavailable = e => this.audioChunks.push(e.data);
                        this.mediaRecorder.onstop = () => {
                            const reader = new FileReader();
                            reader.readAsDataURL(new Blob(this.audioChunks, { type: 'audio/webm' }));
                            reader.onloadend = () => {
                                if(!this.activeChapter.recordings) this.activeChapter.recordings = [];
                                this.activeChapter.recordings.push(reader.result); 
                                this.forceSync(true); // Sync immediately for audio
                            };
                        };
                        this.mediaRecorder.start(); this.isRecording = true;
                    } catch (e) { alert('Mic access error.'); }
                },
                stopRecording() { if(this.mediaRecorder) { this.mediaRecorder.stop(); this.isRecording = false; } },
                toggleAudio(base64, idx) {
                    if (this.audioPlaying && this.currentAudioIdx === idx) this.pauseAudio();
                    else {
                        if (this.audioInstance) this.stopAudio();
                        this.currentAudioIdx = idx; this.audioInstance = new Audio(base64);
                        this.audioInstance.onloadedmetadata = () => this.audioDuration = this.audioInstance.duration;
                        this.audioInstance.onended = () => this.stopAudio();
                        this.audioInstance.play(); this.audioPlaying = true;
                        this.audioTicker = setInterval(() => this.audioCurrentTime = this.audioInstance.currentTime, 100);
                    }
                },
                pauseAudio() { if(this.audioInstance) this.audioInstance.pause(); this.audioPlaying = false; clearInterval(this.audioTicker); },
                stopAudio() {
                    if(this.audioInstance) { this.audioInstance.pause(); this.audioInstance = null; }
                    this.audioPlaying = false; this.currentAudioIdx = null; this.audioCurrentTime = 0; clearInterval(this.audioTicker);
                },
                seekAudio(val) { if(this.audioInstance) { this.audioInstance.currentTime = val; this.audioCurrentTime = val; }},
                formatSeconds(sec) { return `${Math.floor(sec/60)}:${Math.floor(sec%60).toString().padStart(2,'0')}`; },
                deleteRecording(idx) { if(confirm("Delete?")) { if(this.currentAudioIdx === idx) this.stopAudio(); this.activeChapter.recordings.splice(idx, 1); this.forceSync(true); } },

                formatTime(sec) { return `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`; },
                toggleTimer() {
                    if (this.timerActive) { clearInterval(this.timerInterval); this.timerActive = false; } 
                    else {
                        this.timerActive = true;
                        this.timerInterval = setInterval(() => { if (this.timerSeconds > 0) this.timerSeconds--; else this.toggleTimer(); }, 1000);
                    }
                },
                resetTimer() { this.timerSeconds = 1500; this.timerActive = false; clearInterval(this.timerInterval); }
            }
        }
    </script>
